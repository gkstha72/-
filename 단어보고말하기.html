<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>단어 보고 말하기 훈련</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;background:#f4f6fa;color:#162033}
.app{max-width:1120px;margin:0 auto;padding:24px 22px 48px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px}
.brand{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:900}
.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#315cff,#37c4ff);color:white;display:grid;place-items:center;font-weight:900}
button{border:none;border-radius:14px;padding:12px 17px;font-size:15px;font-weight:900;cursor:pointer}
button:disabled{opacity:.5;cursor:not-allowed}
.primary{background:#246bfe;color:white}
.secondary{background:#eef3ff;color:#246bfe}
.gray{background:#edf1f6;color:#5d687b}
.blue{background:#246bfe;color:white}
.red{background:#e54848;color:white}
.panel{background:white;border:1px solid #e2e8f0;border-radius:24px;padding:22px;box-shadow:0 8px 24px rgba(15,30,60,.06);margin-bottom:20px}
.panel h2{margin:0 0 16px;font-size:22px}
.setup-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
label{display:block;font-size:13px;font-weight:900;color:#475569;margin-bottom:7px}
select{width:100%;border:1px solid #dce3ef;border-radius:13px;padding:12px 13px;font-size:14px;outline:none;background:white}
.subject-box,.help-box{background:#f8faff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin-bottom:16px;color:#475569;line-height:1.6}
.help-box{margin-top:16px;font-size:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.word-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.item-card{background:#f8faff;border:1px solid #e2e8f0;border-radius:16px;padding:14px;font-size:15px;font-weight:900;color:#334155}
.item-card strong{color:#246bfe;margin-right:5px}
.tag{display:inline-block;margin-left:6px;padding:3px 8px;border-radius:999px;background:#eef3ff;color:#246bfe;font-size:12px;font-weight:900}
.hidden{display:none!important}
.progress-line{height:10px;background:#edf1f7;border-radius:999px;overflow:hidden;margin-bottom:18px}
.progress-bar{height:100%;width:0%;background:#246bfe}
.question{color:#246bfe;font-size:26px;line-height:1.5;font-weight:900;text-align:center;margin-bottom:16px}
.training-box{background:#f8faff;border-radius:24px;padding:42px 24px;text-align:center;margin-bottom:18px;min-height:380px;display:grid;place-items:center}
.training-title{font-size:22px;font-weight:900;color:#246bfe;margin-bottom:20px}
.target-word{font-size:86px;line-height:1.15;font-weight:1000;letter-spacing:-2px;color:#162033;margin-bottom:24px;word-break:keep-all}
.speech-card{background:white;border:2px solid #dbe7ff;border-radius:22px;padding:18px;max-width:880px;margin:0 auto;box-shadow:0 8px 22px rgba(15,30,60,.06)}
.mic-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:12px}
.mic-btn{width:96px;height:96px;border-radius:50%;border:none;background:#246bfe;color:white;font-size:38px;display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 22px rgba(36,107,254,.35);transition:transform .15s,background .2s,box-shadow .2s}
.mic-btn:active{transform:scale(.95)}
.mic-btn.listening{background:#e54848;box-shadow:0 0 0 0 rgba(229,72,72,.55);animation:micPulse 1.4s infinite}
.mic-btn:disabled{opacity:.45;cursor:not-allowed;animation:none}
.mic-label{font-size:15px;font-weight:900;color:#475569}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(229,72,72,.55)}70%{box-shadow:0 0 0 18px rgba(229,72,72,0)}100%{box-shadow:0 0 0 0 rgba(229,72,72,0)}}
.result-box{background:#f8faff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;margin-top:14px;text-align:left}
.result-label{font-size:13px;font-weight:900;color:#64748b;margin-bottom:6px}
.recognized-text{font-size:32px;font-weight:1000;color:#162033;line-height:1.4;min-height:46px}
.compare-text{margin-top:8px;font-size:17px;font-weight:900;line-height:1.5;color:#475569}
.playback-btn{margin-top:12px;width:100%}
.feedback{display:none;margin-top:12px;padding:16px;border-radius:16px;font-size:24px;font-weight:900;text-align:center}
.feedback.correct{background:#e8fff4;color:#16a06f;border:1px solid #a7f3d0}
.feedback.wrong{background:#fff1f1;color:#e54848;border:1px solid #fecaca}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
.summary-card{background:white;border:1px solid #edf2f7;border-radius:20px;padding:22px 16px;text-align:center;box-shadow:0 8px 22px rgba(15,30,60,.06)}
.summary-icon{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;margin:0 auto 10px;color:white;font-size:22px;font-weight:900}
.summary-card strong{display:block;font-size:30px;line-height:1;margin-bottom:8px;font-weight:900}
.summary-card span{color:#334155;font-size:15px;font-weight:800}
.summary-card.total strong,.summary-card.rate strong{color:#246bfe}
.summary-card.correct strong{color:#16a06f}
.summary-card.wrong strong{color:#e54848}
.summary-icon.total,.summary-icon.rate{background:#246bfe}
.summary-icon.correct{background:#16a06f}
.summary-icon.wrong{background:#e54848}
@media(max-width:900px){.setup-grid{grid-template-columns:1fr 1fr}.word-grid{grid-template-columns:repeat(2,1fr)}.summary-grid{grid-template-columns:repeat(2,1fr)}.topbar{align-items:flex-start;flex-direction:column}.target-word{font-size:68px}}
@media(max-width:560px){.setup-grid,.word-grid,.summary-grid{grid-template-columns:1fr}.question{font-size:22px}.target-word{font-size:54px}.recognized-text{font-size:26px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar">
  <div class="brand"><div class="logo">말</div><span>단어 보고 말하기 훈련</span></div>
  <button class="gray" onclick="location.href='index.html'">메인으로</button>
</header>

<section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>

<section id="setupView" class="panel">
<h2>훈련 설정</h2>
<div class="setup-grid">
  <div><label for="categoryValue">범주</label><select id="categoryValue" onchange="generateMaterials();renderStats();"></select></div>
  <div><label for="syllableLength">글자 수</label><select id="syllableLength" onchange="generateMaterials()"><option value="all" selected>전체</option><option value="1">1글자</option><option value="2">2글자</option><option value="3">3글자</option><option value="4">4글자 이상</option></select></div>
  <div><label for="count">개수</label><select id="count" onchange="generateMaterials()"><option value="10" selected>10개</option><option value="20">20개</option><option value="30">30개</option><option value="50">50개</option><option value="all">전체</option></select></div>
  <div><label for="orderMode">제시 방식</label><select id="orderMode" onchange="generateMaterials()"><option value="random" selected>무작위</option><option value="order">순서대로</option></select></div>
</div>
<div class="help-box">
  화면에 제시된 단어를 말하면, 핸드폰 또는 브라우저의 음성인식으로 발화를 텍스트로 변환하여 자동으로 정답/오답을 판정합니다.<br/>
  인식된 발음과 정답을 자모(초성·중성·종성) 단위로 비교해 채점하므로, 한두 글자 정도 어눌하게 들려도 유사도가 충분히 높으면 정답으로 인정됩니다.
</div>
<div class="actions">
  <button class="primary" onclick="generateMaterials()">자료 생성</button>
  <button class="secondary" onclick="startTraining()">훈련 시작</button>
</div>
</section>

<section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
<section id="statsView" class="panel"><h2>범주별 자료 수</h2><div id="statsBox"></div></section>

<section id="trainingView" class="panel hidden">
<div id="question" class="question">화면의 단어를 보고 말해보세요.</div>
<div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
<div class="training-box">
  <div style="width:100%;">
    <div id="trainingTitle" class="training-title">1번 문항</div>
    <div id="targetWord" class="target-word">단어</div>
    <div class="speech-card">
      <div class="mic-row">
        <button id="micBtn" class="mic-btn" onclick="toggleSpeechRecognition()">🎤</button>
        <div id="micLabel" class="mic-label">눌러서 말하기</div>
      </div>
      <div id="speechSupportMsg" class="compare-text">마이크를 눌러 단어를 말해주세요.</div>
      <div class="result-box">
        <div class="result-label">인식된 말</div>
        <div id="recognizedText" class="recognized-text">-</div>
        <div id="compareText" class="compare-text"></div>
        <button id="playbackBtn" class="secondary playback-btn" onclick="playRecordedAudio()" disabled>🔊 내 발음 다시 듣기</button>
        <audio id="recordedAudioPlayer" hidden></audio>
      </div>
    </div>
  </div>
</div>
<div id="feedbackBox" class="feedback"></div>
<div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div>
</section>

<section id="finishView" class="panel hidden">
<h2>훈련 결과</h2><p id="finishText"></p><div class="summary-grid" id="summaryGrid"></div>
<div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div>
</section>
</main>

function unique(array){return[...new Set(array)]}
function shuffle(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function syllableCount(word){return [...word].filter(ch=>ch>="가"&&ch<="힣").length}
function normalizeSpeech(value){return String(value||"").replace(/\s+/g,"").replace(/[.,!?~'"“”‘’()[\]{}<>:;·ㆍ]/g,"").trim()}

// ===== 자모 단위 유사도 채점 (어눌한 발음 인정용) =====
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

function decomposeToJamo(str){
  const result=[];
  for(const ch of String(str||"")){
    const code=ch.charCodeAt(0)-0xAC00;
    if(code>=0&&code<=11171){
      const cho=Math.floor(code/(21*28));
      const jung=Math.floor((code%(21*28))/28);
      const jong=code%28;
      result.push(CHO[cho],JUNG[jung]);
      if(JONG[jong])result.push(JONG[jong]);
    }else{
      result.push(ch);
    }
  }
  return result;
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i;
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1]===b[j-1])dp[i][j]=dp[i-1][j-1];
      else dp[i][j]=1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
    }
  }
  return dp[m][n];
}

// 0~1 사이 유사도 (1이면 완전 일치). 한글은 자모 단위로 분해해서 비교하므로
// 음절 하나가 살짝 다르게 들려도(예: "사과"→"사가") 유사도가 크게 떨어지지 않음.
function jamoSimilarity(expected,spoken){
  const a=decomposeToJamo(expected);
  const b=decomposeToJamo(spoken);
  if(!a.length&&!b.length)return 1;
  if(!a.length||!b.length)return 0;
  const dist=levenshtein(a,b);
  const maxLen=Math.max(a.length,b.length);
  return 1-(dist/maxLen);
}

// 유사도 임계값: 글자 수가 짧을수록(1~2글자) 엄격하게, 길수록 조금 더 관대하게
function similarityThreshold(expected){
  const n=syllableCount(expected);
  if(n<=1)return 0.85;
  if(n===2)return 0.75;
  if(n===3)return 0.7;
  return 0.65;
}

function setupSpeechRecognition(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    document.getElementById("speechSupportMsg").textContent="이 브라우저는 음성인식을 지원하지 않을 수 있습니다. Android Chrome 또는 Edge에서 사용해 주세요.";
    document.getElementById("micBtn").disabled=true;
    return;
  }

  recognition=new SpeechRecognition();
  recognition.lang="ko-KR";
  recognition.interimResults=true;
  recognition.continuous=false;
  recognition.maxAlternatives=3;

  recognition.onstart=function(){
    isRecognizing=true;
    setMicState("listening");
    document.getElementById("speechSupportMsg").textContent="듣고 있습니다. 단어를 천천히 말해주세요.";
    startAudioRecording();
    clearTimeout(recognitionWatchdog);
    recognitionWatchdog=setTimeout(()=>{ if(isRecognizing) stopSpeechRecognition(); },8000);
  };

  recognition.onresult=function(event){
    let transcript="";
    let finalAlternatives=[];
    for(let i=event.resultIndex;i<event.results.length;i++) {
      transcript += event.results[i][0].transcript;
      if(event.results[i].isFinal){
        for(let a=0;a<event.results[i].length;a++){
          finalAlternatives.push(event.results[i][a].transcript);
        }
      }
    }
    lastRecognizedText=transcript.trim();
    document.getElementById("recognizedText").textContent=lastRecognizedText||"-";

    const isFinal=event.results[event.results.length-1].isFinal;
    if(isFinal) checkSpeechAnswer(finalAlternatives.length?finalAlternatives:[lastRecognizedText]);
  };

  recognition.onerror=function(event){
    isRecognizing=false;
    setMicState("idle");
    stopAudioRecording();
    clearTimeout(recognitionWatchdog);
    if(event.error==="no-speech") document.getElementById("speechSupportMsg").textContent="음성이 감지되지 않았습니다. 마이크를 눌러 다시 말해주세요.";
    else document.getElementById("speechSupportMsg").textContent="음성인식 오류가 발생했습니다. 마이크 권한이나 주변 소음을 확인해 주세요.";
  };

  recognition.onend=function(){
    isRecognizing=false;
    setMicState("idle");
    stopAudioRecording();
    clearTimeout(recognitionWatchdog);
    if(!choiceLocked) document.getElementById("speechSupportMsg").textContent="다시 말하려면 마이크를 눌러주세요.";
  };
}

// ===== 발화 녹음 & 재생 (청각적 피드백) =====
function ensureMicStream(){
  if(micStream)return Promise.resolve(micStream);
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return Promise.reject(new Error("getUserMedia 미지원"));
  return navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{micStream=stream;return stream;});
}

function startAudioRecording(){
  if(!window.MediaRecorder)return;
  ensureMicStream().then(stream=>{
    try{
      audioChunks=[];
      mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)audioChunks.push(e.data);};
      mediaRecorder.onstop=function(){
        if(!audioChunks.length)return;
        if(recordedAudioUrl)URL.revokeObjectURL(recordedAudioUrl);
        const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||"audio/webm"});
        recordedAudioUrl=URL.createObjectURL(blob);
        const player=document.getElementById("recordedAudioPlayer");
        player.src=recordedAudioUrl;
        document.getElementById("playbackBtn").disabled=false;
      };
      mediaRecorder.start();
    }catch(error){/* 녹음을 지원하지 않는 환경은 조용히 무시 (음성인식만 정상 동작) */}
  }).catch(()=>{/* 마이크 권한 거부 시 녹음 기능만 비활성, 음성인식은 별도로 동작 */});
}

function stopAudioRecording(){
  if(mediaRecorder&&mediaRecorder.state==="recording"){try{mediaRecorder.stop();}catch(error){}}
}

function playRecordedAudio(){
  const player=document.getElementById("recordedAudioPlayer");
  if(!player.src)return;
  player.currentTime=0;
  player.play().catch(()=>{});
}

function setMicState(state){
  const btn=document.getElementById("micBtn");
  const label=document.getElementById("micLabel");
  if(state==="listening"){
    btn.classList.add("listening");
    btn.textContent="⏹";
    label.textContent="듣는 중... (눌러서 중지)";
  }else{
    btn.classList.remove("listening");
    btn.textContent="🎤";
    label.textContent="눌러서 말하기";
  }
}

async function toggleSpeechRecognition(){
  if(choiceLocked)return;
  if(!recognition) setupSpeechRecognition();
  if(!recognition)return;
  if(isRecognizing){
    stopSpeechRecognition();
    return;
  }
  clearSpeechResult(false);
  try{ await ensureMicStream(); }catch(error){ /* 녹음 권한이 거부되어도 음성인식 자체는 계속 진행 */ }
  try{recognition.start();}catch(error){}
}

function stopSpeechRecognition(){
  if(recognition&&isRecognizing){try{recognition.stop();}catch(error){}}
}

function clearSpeechResult(clearMessage=true){
  lastRecognizedText="";
  document.getElementById("recognizedText").textContent="-";
  document.getElementById("compareText").textContent="";
  document.getElementById("playbackBtn").disabled=true;
  if(clearMessage) document.getElementById("speechSupportMsg").textContent="마이크를 눌러 단어를 말해주세요.";
}

function isSpeechCorrect(expected, spoken){
  const expectedNorm=normalizeSpeech(expected);
  const spokenNorm=normalizeSpeech(spoken);
  if(!expectedNorm||!spokenNorm)return false;
  if(spokenNorm===expectedNorm)return true;
  if(spokenNorm.includes(expectedNorm)||expectedNorm.includes(spokenNorm))return true;
  const sim=jamoSimilarity(expectedNorm,spokenNorm);
  return sim>=similarityThreshold(expectedNorm);
}

// 여러 인식 후보(alternatives) 중 정답과 가장 비슷한 것을 찾아 반환
// {matched, best, bestSimilarity}
function pickBestCandidate(expected, candidates){
  const expectedNorm=normalizeSpeech(expected);
  let best=null,bestSim=-1;
  for(const cand of candidates){
    const cNorm=normalizeSpeech(cand);
    if(!cNorm)continue;
    const sim=cNorm===expectedNorm?1:jamoSimilarity(expectedNorm,cNorm);
    if(sim>bestSim){bestSim=sim;best=cand;}
    if(isSpeechCorrect(expected,cand))return{matched:true,best:cand,bestSimilarity:sim};
  }
  return{matched:false,best:best||candidates[0]||"",bestSimilarity:Math.max(bestSim,0)};
}

function checkSpeechAnswer(spokenCandidates){
  if(choiceLocked)return;
  const candidates=Array.isArray(spokenCandidates)?spokenCandidates:[spokenCandidates];
  const item=materials[currentIndex];
  const{matched,best,bestSimilarity}=pickBestCandidate(item.word,candidates);
  const spoken=best||candidates[0]||"";
  const simPercent=Math.round(Math.max(0,bestSimilarity)*100);
  document.getElementById("compareText").textContent=`정답 단어: ${item.word} / 인식 결과: ${spoken||"-"} (유사도 ${simPercent}%)`;

  if(matched){
    choiceLocked=true;
    document.getElementById("micBtn").disabled=true;
    showFeedback("정답입니다.",true);
    answers.push({word:item.word,category:item.category,response:spoken,correct:retryCount===0,retry:retryCount});
    setTimeout(nextItem,1200);
    return;
  }

  retryCount+=1;
  if(retryCount===1){
    showFeedback("다시 말해보세요.",false);
    return;
  }

  choiceLocked=true;
  document.getElementById("micBtn").disabled=true;
  showFeedback(`오답입니다. 정답은 "${item.word}"입니다. 다음 문제를 눌러주세요.`,false);
  answers.push({word:item.word,category:item.category,response:spoken,correct:false,retry:retryCount});
  document.getElementById("nextBtn").style.display="inline-block";
}

function startTraining(){
  if(!materials.length)generateMaterials();
  if(!materials.length)return;
  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("previewView").classList.add("hidden");
  document.getElementById("statsView").classList.add("hidden");
  document.getElementById("trainingView").classList.remove("hidden");
  document.getElementById("finishView").classList.add("hidden");
  currentIndex=0;answers=[];setupSpeechRecognition();showItem();
}

function showItem(){
  choiceLocked=false;retryCount=0;lastRecognizedText="";
  document.getElementById("micBtn").disabled=false;
  setMicState("idle");
  const item=materials[currentIndex];
  document.getElementById("trainingTitle").textContent=`${currentIndex+1} / ${materials.length}`;
  document.getElementById("targetWord").textContent=item.word;
  document.getElementById("progressBar").style.width=`${(currentIndex/materials.length)*100}%`;
  document.getElementById("feedbackBox").style.display="none";
  document.getElementById("feedbackBox").textContent="";
  document.getElementById("feedbackBox").className="feedback";
  document.getElementById("nextBtn").style.display="none";
  clearSpeechResult();
}

function showFeedback(message,isCorrectStyle){
  const box=document.getElementById("feedbackBox");
  box.style.display="block";box.textContent=message;box.className="feedback "+(isCorrectStyle?"correct":"wrong");
}

function nextQuestionManual(){if(!choiceLocked)return;nextItem()}

function nextItem(){
  stopSpeechRecognition();
  currentIndex++;
  if(currentIndex>=materials.length)finishTraining();else showItem();
}

function finishTraining(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("trainingView").classList.add("hidden");
  document.getElementById("finishView").classList.remove("hidden");
  const total=answers.length;
  const correct=answers.filter(a=>a.correct).length;
  const wrong=total-correct;
  const rate=total?Math.round((correct/total)*100):0;
  const subjectName=selectedSubject?selectedSubject.name:"대상자";
  document.getElementById("finishText").textContent=`${subjectName}님의 ${TRAINING_NAME} 결과입니다.`;
  document.getElementById("summaryGrid").innerHTML=`<div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div><div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div><div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;
  const history=Store.load("speech_training_history",[]);
  history.push({id:Date.now(),subjectId:selectedSubjectId,subjectName,training:TRAINING_NAME,date:new Date().toISOString(),total,correct,wrong,rate,answers});
  Store.save("speech_training_history",history);
}

renderSubject();renderCategoryOptions();generateMaterials();renderStats();
</script>
