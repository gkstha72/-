<div class="help-box">속담의 빈칸에 들어갈 알맞은 단어를 고르는 훈련입니다. 1회 오답 시 다시 풀어보고, 2회 오답 시 정답을 보여준 뒤 다음 문제로 넘어갑니다. 1번 틀리고 두 번째에 맞춘 경우도 오답으로 기록됩니다.</div>

<div id="meaningBox" class="meaning-box"></div>

<div style="margin-top:12px;"><textarea id="itemMemo" placeholder="문항별 메모"></textarea></div>

<section id="finishView" class="panel hidden">
<h2>훈련 결과</h2><p id="finishText"></p><div class="summary-grid" id="summaryGrid"></div>
<div class="actions"><button class="primary" onclick="location.href='main.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div>
</section>
</main>

let materials=[],currentIndex=0,answers=[],choiceLocked=false,retryCount=0;

function unique(array){return[...new Set(array)]}
function shuffle(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}

function renderSubject(){
  const box=document.getElementById("subjectBox");
  if(!selectedSubject){box.innerHTML=`선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='main.html'">대상자 등록하기</button>`;return}
  box.innerHTML=`<strong>${selectedSubject.name}</strong><br />${selectedSubject.number||""} ${selectedSubject.memo?" · "+selectedSubject.memo:""}`;
}

function buildOptions(item){
  const choiceCount=Number(document.getElementById("choiceCount").value)===2?2:4;
  const pool=shuffle(unique(PROVERBS.flatMap(p=>p.choices).filter(v=>v!==item.blank)));
  return shuffle(unique([item.blank,...pool]).slice(0,choiceCount));
}

function generateMaterials(){
  const countValue=document.getElementById("count").value;
  const orderMode=document.getElementById("orderMode").value;
  let source=orderMode==="random"?shuffle(PROVERBS):[...PROVERBS];
  const limit=countValue==="all"?source.length:Number(countValue);
  materials=source.slice(0,Math.min(limit,source.length)).map((item,idx)=>({...item,no:idx+1,options:buildOptions(item),memo:""}));
  currentIndex=0;answers=[];renderPreview();
}

function formatDisplay(text){
  return text.replace(/\(\s*\)/g, '<span class="blank-line"></span>');
}

function renderPreview(){
  document.getElementById("previewTitle").textContent=`생성 자료 ${materials.length}개`;
  const list=document.getElementById("previewList");
  list.innerHTML=materials.map((item,idx)=>`<div class="item-card"><strong>${idx+1}.</strong>${formatDisplay(item.display)}<br><span class="tag">정답: ${item.blank}</span></div>`).join("");
}

function startTraining(){
  if(!materials.length)generateMaterials();
  if(!materials.length)return;
  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("previewView").classList.add("hidden");
  document.getElementById("trainingView").classList.remove("hidden");
  document.getElementById("finishView").classList.add("hidden");
  currentIndex=0;answers=[];showItem();
}

function showItem(){
  choiceLocked=false;retryCount=0;
  const item=materials[currentIndex];
  document.getElementById("trainingTitle").textContent=`${currentIndex+1} / ${materials.length}`;
  document.getElementById("proverbText").innerHTML=formatDisplay(item.display);
  document.getElementById("progressBar").style.width=`${(currentIndex/materials.length)*100}%`;
  document.getElementById("itemMemo").value=item.memo||"";
  document.getElementById("feedbackBox").style.display="none";
  document.getElementById("feedbackBox").textContent="";
  document.getElementById("feedbackBox").className="feedback";
  document.getElementById("meaningBox").style.display="none";
  document.getElementById("meaningBox").textContent="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("answerOptions").innerHTML=item.options.map(choice=>`<button class="answer-btn" onclick="selectAnswer(this, '${choice.replace(/'/g,"\\'")}')">${choice}</button>`).join("");
}

function saveMemo(){if(materials[currentIndex])materials[currentIndex].memo=document.getElementById("itemMemo").value.trim()}

function showFeedback(message,isCorrectStyle){
  const box=document.getElementById("feedbackBox");
  box.style.display="block";box.textContent=message;box.className="feedback "+(isCorrectStyle?"correct":"wrong");
}

function showMeaning(){
  if(document.getElementById("meaningMode").value==="hide")return;
  const item=materials[currentIndex];
  const box=document.getElementById("meaningBox");
  box.style.display="block";
  box.textContent=`뜻: ${item.meaning}`;
}

function setAnswerButtonsDisabled(disabled){document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=disabled)}

function markChoiceResult(selectedButton,selectedChoice){
  const item=materials[currentIndex];
  document.querySelectorAll(".answer-btn").forEach(btn=>{
    if(btn.textContent===item.blank)btn.classList.add("correct-choice");
    if(btn===selectedButton&&selectedChoice!==item.blank)btn.classList.add("wrong-choice");
  });
}

function selectAnswer(button,choice){
  if(choiceLocked)return;
  saveMemo();
  const item=materials[currentIndex];
  const isCorrect=choice===item.blank;

  if(isCorrect){
    choiceLocked=true;
    setAnswerButtonsDisabled(true);
    markChoiceResult(button,choice);
    showFeedback("정답입니다.",true);
    showMeaning();
    const countedCorrect=retryCount===0;
    answers.push({sentence:item.sentence,blank:item.blank,response:choice,correct:countedCorrect,retry:retryCount,memo:item.memo||""});
    setTimeout(nextItem,1400);
    return;
  }

  retryCount+=1;
  if(retryCount===1){
    button.classList.add("wrong-choice");
    showFeedback("다시 풀어보세요.",false);
    setTimeout(()=>button.classList.remove("wrong-choice"),800);
    return;
  }

  choiceLocked=true;
  setAnswerButtonsDisabled(true);
  markChoiceResult(button,choice);
  showFeedback(`정답은 "${item.blank}"입니다. 다음 문제를 눌러주세요.`,false);
  showMeaning();
  answers.push({sentence:item.sentence,blank:item.blank,response:choice,correct:false,retry:retryCount,memo:item.memo||""});
  document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestionManual(){if(!choiceLocked)return;nextItem()}

function nextItem(){
  currentIndex++;
  if(currentIndex>=materials.length)finishTraining();else showItem();
}

function finishTraining(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("trainingView").classList.add("hidden");
  document.getElementById("finishView").classList.remove("hidden");
  const total=answers.length;
  const correct=answers.filter(a=>a.correct).length;
  const wrong=total-correct;
  const rate=total?Math.round((correct/total)*100):0;
  const subjectName=selectedSubject?selectedSubject.name:"대상자";
  document.getElementById("finishText").textContent=`${subjectName}님의 ${TRAINING_NAME} 결과입니다.`;
  document.getElementById("summaryGrid").innerHTML=`<div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div><div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div><div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;
  const history=Store.load("speech_training_history",[]);
  history.push({id:Date.now(),subjectId:selectedSubjectId,subjectName,training:TRAINING_NAME,date:new Date().toISOString(),total,correct,wrong,rate,answers});
  Store.save("speech_training_history",history);
}

renderSubject();generateMaterials();
