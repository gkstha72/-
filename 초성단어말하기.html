<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초성으로 시작하는 단어 말하기</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Pretendard","Noto Sans KR",Arial,sans-serif; background:#f4f6fa; color:#162033; }
    .app { max-width:1120px; margin:0 auto; padding:24px 22px 48px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
    .brand { display:flex; align-items:center; gap:12px; font-size:22px; font-weight:900; }
    .logo { width:44px; height:44px; border-radius:14px; background:linear-gradient(135deg,#315cff,#37c4ff); color:white; display:grid; place-items:center; font-weight:900; }
    button { border:none; border-radius:14px; padding:12px 17px; font-size:15px; font-weight:900; cursor:pointer; }
    .primary { background:#246bfe; color:white; } .secondary { background:#eef3ff; color:#246bfe; } .gray { background:#edf1f6; color:#5d687b; }
    .blue { background:#246bfe; color:white; } .red { background:#e54848; color:white; }
    .panel { background:white; border:1px solid #e2e8f0; border-radius:24px; padding:22px; box-shadow:0 8px 24px rgba(15,30,60,.06); margin-bottom:20px; }
    .panel h2 { margin:0 0 16px; font-size:22px; }
    .setup-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    label { display:block; font-size:13px; font-weight:900; color:#475569; margin-bottom:7px; }
    input, select, textarea { width:100%; border:1px solid #dce3ef; border-radius:13px; padding:12px 13px; font-size:14px; outline:none; background:white; }
    textarea { min-height:74px; resize:vertical; }
    .subject-box,.help-box { background:#f8faff; border:1px solid #e2e8f0; border-radius:18px; padding:16px; margin-bottom:16px; color:#475569; line-height:1.6; }
    .help-box { margin-top:16px; font-size:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .word-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .item-card { background:#f8faff; border:1px solid #e2e8f0; border-radius:15px; padding:14px; font-size:16px; line-height:1.5; }
    .item-card strong { color:#246bfe; margin-right:5px; }
    .hidden { display:none !important; }
    .progress-line { height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin-bottom:18px; }
    .progress-bar { height:100%; width:0%; background:#246bfe; }
    .question { color:#246bfe; font-size:26px; line-height:1.5; font-weight:900; text-align:center; margin-bottom:16px; }
    .timer-box {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    .timer-display {
      min-width:150px;
      text-align:center;
      background:linear-gradient(135deg,#246bfe,#37c4ff);
      color:white;
      border-radius:24px;
      padding:16px 24px;
      font-size:42px;
      font-weight:900;
      box-shadow:0 10px 26px rgba(36,107,254,.25);
      letter-spacing:.5px;
    }

    .timer-label {
      width:100%;
      text-align:center;
      font-size:14px;
      font-weight:900;
      color:#64748b;
      margin-bottom:-6px;
    }
    .control-buttons {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:18px;
      padding-top:16px;
      border-top:1px dashed #cbd5e1;
    }
    .control-buttons button {
      min-height:58px;
      font-size:18px;
    }
    .start-btn {
      background:#0f172a;
      color:white;
      border:2px solid #0f172a;
    }
    .finish-btn {
      background:white;
      color:#e54848;
      border:2px solid #e54848;
    }
    .finish-btn:hover {
      background:#fff1f1;
    }
    .training-box { background:#f8faff; border-radius:24px; padding:42px 24px; text-align:center; margin-bottom:18px; min-height:320px; display:grid; place-items:center; }
    .training-title { font-size:22px; font-weight:900; color:#246bfe; margin-bottom:18px; }
    .initial-display { font-size:116px; font-weight:900; color:#162033; line-height:1; margin-bottom:18px; }
    .condition { font-size:27px; font-weight:900; color:#246bfe; line-height:1.45; }
    .hint-box { background:#fff; border:1px solid #dbe7ff; border-radius:18px; padding:14px 16px; color:#475569; font-size:17px; line-height:1.6; margin-top:14px; }
    .hint-row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .hint-chip { background:#eef3ff; color:#246bfe; border-radius:999px; padding:8px 14px; font-size:16px; font-weight:900; }
    .input-row { display:grid; grid-template-columns:1fr auto auto; gap:10px; margin:12px 0; align-items:center; }
    .input-row input { font-size:22px; font-weight:900; height:62px; }
    .response-buttons { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:12px; }
    .response-buttons button { min-height:68px; font-size:22px; }
    .feedback { display:none; margin-top:12px; padding:16px; border-radius:16px; font-size:24px; font-weight:900; text-align:center; }
    .produced-list { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .word-pill { background:#eef3ff; color:#246bfe; border-radius:999px; padding:7px 12px; font-size:16px; font-weight:900; }
    .word-pill.wrong { background:#fff1f1; color:#e54848; }
    .result-panel { background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%); border-radius:24px; padding:16px; border:1px solid #edf2f7; box-shadow:0 10px 28px rgba(15,30,60,.05); }
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px; }
    .summary-card { background:white; border:1px solid #edf2f7; border-radius:20px; padding:22px 16px; text-align:center; box-shadow:0 8px 22px rgba(15,30,60,.06); }
    .summary-icon { width:40px; height:40px; border-radius:14px; display:grid; place-items:center; margin:0 auto 10px; color:white; font-size:22px; font-weight:900; }
    .summary-card strong { display:block; font-size:30px; line-height:1; margin-bottom:8px; font-weight:900; }
    .summary-card span { color:#334155; font-size:15px; font-weight:800; }
    .summary-card.total strong,.summary-card.rate strong { color:#246bfe; }
    .summary-card.correct strong { color:#16a06f; }
    .summary-card.wrong strong { color:#e54848; }
    .summary-icon.total,.summary-icon.rate { background:#246bfe; }
    .summary-icon.correct { background:#16a06f; }
    .summary-icon.wrong { background:#e54848; }
    @media (max-width:900px){ .setup-grid{grid-template-columns:1fr 1fr;} .word-grid{grid-template-columns:repeat(2,1fr);} .summary-grid{grid-template-columns:repeat(2,1fr);} .topbar{align-items:flex-start; flex-direction:column;} }
    @media (max-width:560px){ .setup-grid,.word-grid,.summary-grid,.input-row,.response-buttons,.control-buttons{grid-template-columns:1fr;} .initial-display{font-size:82px;} .question{font-size:22px;} }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div class="brand"><div class="logo">초</div><span>초성으로 시작하는 단어 말하기</span></div><button class="gray" onclick="location.href='index.html'">메인으로</button></header>
    <section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>
    <section id="setupView" class="panel">
      <h2>훈련 설정</h2>
      <div class="setup-grid">
        <div><label for="initialValue">초성</label><select id="initialValue" onchange="generateMaterials()"></select></div>
        <div><label for="syllableLength">음절 수</label><select id="syllableLength" onchange="generateMaterials()"><option value="all" selected>전체</option><option value="2">2음절</option><option value="3">3음절</option></select></div>
        <div><label for="timeLimit">시간</label><select id="timeLimit" onchange="generateMaterials()"><option value="60" selected>1분</option><option value="180">3분</option><option value="300">5분</option><option value="0">무제한</option></select></div>
        <div><label for="hintMode">힌트</label><select id="hintMode" onchange="generateMaterials()"><option value="none" selected>힌트 없음</option><option value="letter">한글자 제공</option></select></div>
      </div>
      <div class="help-box">정해진 시간 동안 제시된 초성으로 시작하는 단어를 최대한 많이 말하는 활동입니다. 힌트는 없음 또는 한글자 제공 중 선택할 수 있습니다. 한글자 제공은 버튼을 누를 때마다 1개씩 공개됩니다.</div>
      <div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
    </section>
    <section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
    <section id="trainingView" class="panel hidden">
      <div id="question" class="question">초성으로 시작하는 단어를 말해보세요.</div>
      <div class="timer-box"><div class="timer-label">남은 시간</div><div id="timerDisplay" class="timer-display">60</div></div>
      <div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
      <div class="training-box"><div><div id="trainingTitle" class="training-title">60초 동안 말하기</div><div id="initialDisplay" class="initial-display">ㄱ</div><div id="conditionText" class="condition">ㄱ으로 시작하는 단어를 최대한 많이 말해보세요.</div><div id="hintBox" class="hint-box hidden"></div></div></div>
      <div class="input-row"><input id="spokenWordInput" placeholder="대상자가 말한 단어 입력" onkeydown="if(event.key==='Enter') checkSpokenWord()" /><button class="primary" onclick="checkSpokenWord()">확인</button><button id="hintBtn" class="secondary" onclick="showHint()">힌트 보기</button></div>
      <div id="feedbackBox" class="feedback"></div><div id="producedList" class="produced-list"></div>
      <div class="response-buttons"><button id="correctBtn" class="blue" onclick="manualRecord('correct')">정답</button><button id="wrongBtn" class="red" onclick="manualRecord('wrong')">오답</button></div>
      <div class="control-buttons"><button id="timerBtn" class="start-btn" onclick="toggleTimer()">시작</button><button id="finishBtn" class="finish-btn" onclick="finishCurrentTask()">훈련 종료</button></div>
    </section>
    <section id="finishView" class="panel hidden"><h2>훈련 결과</h2><p id="finishText"></p><div class="result-panel"><div id="summaryGrid" class="summary-grid"></div></div><div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div></section>
  </main>

let answers = [], currentProduced = [], timerId = null, remainingSeconds = 60, choiceLocked = false, hintIndex = 0, revealedHints = [];

function unique(array){ return [...new Set(array)]; }
function shuffle(array){ const copy=[...array]; for(let i=copy.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [copy[i],copy[j]]=[copy[j],copy[i]]; } return copy; }
function isHangul(char){ const code=char.charCodeAt(0); return code>=0xAC00 && code<=0xD7A3; }
function decompose(char){ if(!isHangul(char)) return null; const code=char.charCodeAt(0)-0xAC00; return { initial:INITIALS[Math.floor(code/588)], medial:MEDIALS[Math.floor((code%588)/28)], final:FINALS[code%28] }; }
function getInitial(word){ const first=[...word].find(isHangul); return first ? decompose(first).initial : ""; }
function countHangulSyllables(word){ return [...word].filter(isHangul).length; }
function normalizeWord(word){ return String(word||"").trim().replace(/\s+/g,""); }

function renderSubject(){
  const box=document.getElementById("subjectBox");
  if(!selectedSubject){ box.innerHTML=`선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`; return; }
  box.innerHTML=`<strong>${selectedSubject.name}</strong><br />${selectedSubject.number || "등록번호 없음"} · ${selectedSubject.gender} · ${selectedSubject.age}세<br />${selectedSubject.diagnosis || "진단명 미입력"} · ${selectedSubject.goal || "목표 미입력"}`;
}
function updateHintButtonVisibility(){
  const btn = document.getElementById("hintBtn");
  if(!btn) return;
  const s = getSettings();
  btn.style.display = s.hintMode === "none" ? "none" : "";
}

function renderOptions(){
  const availableInitials = Object.keys(WORD_DB_BY_INITIAL);
  document.getElementById("initialValue").innerHTML=availableInitials.map(v=>`<option value="${v}">${v}</option>`).join("");
}
function getSettings(){ return { initialValue:document.getElementById("initialValue").value, syllableLength:document.getElementById("syllableLength").value, timeLimit:Number(document.getElementById("timeLimit").value), hintMode:document.getElementById("hintMode").value }; }
function getWordPool(settings){
  const source = WORD_DB_BY_INITIAL[settings.initialValue] || [];
  return unique(source).filter(word=>{
    const n=countHangulSyllables(word);
    const lengthOK=settings.syllableLength==="all" ? true : n===Number(settings.syllableLength);
    return lengthOK;
  });
}
function generateMaterials(){ renderPreview(); updateHintButtonVisibility(); }
function formatTimeLabel(seconds){
  if(seconds === 0) return "무제한";
  if(seconds % 60 === 0) return `${seconds / 60}분`;
  return `${seconds}초`;
}

function renderPreview(){
  const s=getSettings(), pool=getWordPool(s);
  const lengthLabel=s.syllableLength==="all" ? "전체 음절" : `${s.syllableLength}음절`;
  const hintLabel=s.hintMode==="none" ? "힌트 없음" : "한글자 제공";
  const timeLabel = formatTimeLabel(s.timeLimit);
  document.getElementById("previewTitle").textContent=`${s.initialValue} 초성 · ${lengthLabel} · ${timeLabel} · ${hintLabel}`;
  document.getElementById("previewList").innerHTML = pool.length ? [
    `<div class="item-card"><strong>활동</strong>${s.initialValue}으로 시작하는 단어 말하기</div>`,
    `<div class="item-card"><strong>시간</strong>${timeLabel}</div>`,
    `<div class="item-card"><strong>힌트</strong>${hintLabel}</div>`,
    `<div class="item-card"><strong>예시 수</strong>${pool.length}개</div>`
  ].join("") : `<div class="item-card">해당 조건의 예시 단어가 부족합니다. 다른 초성이나 음절 수를 선택해 주세요.</div>`;
}
function startTraining(){
  if(!selectedSubject){ alert("대상자를 먼저 등록하거나 선택해주세요."); location.href="index.html"; return; }
  const pool=getWordPool(getSettings()); if(pool.length===0) return;
  answers=[]; currentProduced=[]; choiceLocked=false; clearTimer();
  document.getElementById("setupView").classList.add("hidden"); document.getElementById("previewView").classList.add("hidden"); document.getElementById("trainingView").classList.remove("hidden"); document.getElementById("finishView").classList.add("hidden");
  renderTrainingItem();
}
function renderTrainingItem(){
  const s=getSettings(); remainingSeconds=s.timeLimit; currentProduced=[]; choiceLocked=false; hintIndex=0; revealedHints=[];
  const timeLabel = formatTimeLabel(s.timeLimit);
  document.getElementById("timerDisplay").textContent=s.timeLimit === 0 ? "∞" : remainingSeconds;
  document.getElementById("timerBtn").textContent=s.timeLimit === 0 ? "무제한" : "시작";
  document.getElementById("timerBtn").disabled = s.timeLimit === 0;
  updateHintButtonVisibility();
  document.getElementById("progressBar").style.width="0%";
  document.getElementById("trainingTitle").textContent=`${timeLabel} 동안 말하기`; document.getElementById("initialDisplay").textContent=s.initialValue; document.getElementById("conditionText").textContent=`${s.initialValue}으로 시작하는 단어를 최대한 많이 말해보세요.`;
  document.getElementById("spokenWordInput").value="";  document.getElementById("producedList").innerHTML=""; document.getElementById("feedbackBox").style.display="none"; document.getElementById("hintBox").classList.add("hidden"); document.getElementById("hintBox").textContent="";
  document.getElementById("spokenWordInput").focus();
}
function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
function toggleTimer(){
  if(getSettings().timeLimit === 0) return;
  if(timerId){ clearTimer(); document.getElementById("timerBtn").textContent="시작"; return; }
  document.getElementById("timerBtn").textContent="일시정지";
  timerId=setInterval(()=>{ remainingSeconds-=1; if(remainingSeconds<0) remainingSeconds=0; document.getElementById("timerDisplay").textContent=remainingSeconds; const total=getSettings().timeLimit || 60; document.getElementById("progressBar").style.width=`${((total-remainingSeconds)/total)*100}%`; if(remainingSeconds<=0){ clearTimer(); choiceLocked=true; document.getElementById("timerBtn").textContent="종료"; showFeedback("시간이 끝났습니다. 훈련 종료를 눌러주세요.", false); } },1000);
}
function resetTimer(){
  clearTimer();
  const s=getSettings();
  remainingSeconds=s.timeLimit;
  document.getElementById("timerDisplay").textContent=s.timeLimit === 0 ? "∞" : remainingSeconds;
  document.getElementById("timerBtn").textContent=s.timeLimit === 0 ? "무제한" : "시작";
  document.getElementById("timerBtn").disabled = s.timeLimit === 0;
  updateHintButtonVisibility();
  document.getElementById("progressBar").style.width="0%";
  choiceLocked=false;
}
function wordMatchesCurrent(word){
  const s=getSettings(), clean=normalizeWord(word); if(!clean) return {ok:false, reason:"단어를 입력해 주세요."};
  if(getInitial(clean)!==s.initialValue) return {ok:false, reason:`${s.initialValue}으로 시작하지 않습니다.`};
  const n=countHangulSyllables(clean); if(s.syllableLength!=="all" && n!==Number(s.syllableLength)) return {ok:false, reason:`${s.syllableLength}음절 단어가 아닙니다.`};
  return {ok:true, reason:"정답입니다."};
}
function showFeedback(message, isCorrectStyle){
  const box=document.getElementById("feedbackBox"); box.style.display="block"; box.textContent=message; box.style.background=isCorrectStyle ? "#e8fff4" : "#fff1f1"; box.style.color=isCorrectStyle ? "#16a06f" : "#e54848"; box.style.border=isCorrectStyle ? "1px solid #a7f3d0" : "1px solid #fecaca";
}
function renderProducedList(){ document.getElementById("producedList").innerHTML=currentProduced.map(item=>`<span class="word-pill ${item.ok ? "" : "wrong"}">${item.word}</span>`).join(""); }
function checkSpokenWord(){
  if(choiceLocked && remainingSeconds<=0) return;
  const input=document.getElementById("spokenWordInput"), word=normalizeWord(input.value);

  if(word && currentProduced.some(item => item.word === word)){
    showFeedback("이미 입력한 단어입니다.", false);
    input.value="";
    input.focus();
    return;
  }

  const result=wordMatchesCurrent(word);
  currentProduced.push({word:word||"무응답", ok:result.ok}); renderProducedList();
  showFeedback(result.ok ? "정답입니다." : result.reason + " 다시 말해보세요.", result.ok);
  input.value=""; input.focus();
}
function showHint(){
  const s=getSettings(), box=document.getElementById("hintBox"), pool=getWordPool(s);

  if(s.hintMode==="none") return;

  if(pool.length===0){
    box.classList.remove("hidden");
    box.textContent = "제공할 힌트가 없습니다.";
    return;
  }

  const randomWord = pool[Math.floor(Math.random() * pool.length)];

  box.classList.remove("hidden");
  box.textContent = `초성 힌트: ${makeLetterHint(randomWord)}`;
}

function makeLetterHint(word){
  const s = getSettings();
  const chars = [...word];
  const firstHangulIndex = chars.findIndex(isHangul);
  if(firstHangulIndex < 0) return word;
  chars[firstHangulIndex] = s.initialValue;
  return chars.join("");
}
function manualRecord(type){
  const input=document.getElementById("spokenWordInput");
  const word=normalizeWord(input.value) || (type==="correct" ? "수동정답" : "수동오답");

  if(word && word !== "수동정답" && word !== "수동오답" && currentProduced.some(item => item.word === word)){
    showFeedback("이미 입력한 단어입니다.", false);
    input.value="";
    input.focus();
    return;
  }

  currentProduced.push({word, ok:type==="correct"}); renderProducedList(); showFeedback(type==="correct" ? "정답으로 추가했습니다." : "오답으로 추가했습니다.", type==="correct"); input.value=""; input.focus();
}
function finishCurrentTask(){
  clearTimer();
  const s=getSettings();
answers=[{initial:s.initialValue, produced:currentProduced, producedCorrect:currentProduced.filter(x=>x.ok).length, producedWrong:currentProduced.filter(x=>!x.ok).length, timeLimit:s.timeLimit, hintMode:s.hintMode, recordedAt:new Date().toISOString()}];
  finishTraining();
}
function finishTraining(){
  const s=getSettings(); const correct=answers.reduce((sum,item)=>sum+(item.producedCorrect||0),0); const wrong=answers.reduce((sum,item)=>sum+(item.producedWrong||0),0); const total=correct+wrong; const accuracy=total ? Math.round((correct/total)*100) : 0;
  const result={id:`IS${Date.now()}`, subjectId:selectedSubject.id, subjectName:selectedSubject.name, subjectNumber:selectedSubject.number, program:"초성으로 시작하는 단어 말하기", targetType:"initial-speaking", targetTypeName:"초성 단어 산출", targetValue:s.initialValue, level:"word", syllableLength:s.syllableLength, timeLimit:s.timeLimit, hintMode:s.hintMode, total, correct, wrong, accuracy, answers, createdAt:new Date().toISOString(), displayDate:new Date().toLocaleString()};
  const results=Store.load("speech_articulation_results", []); results.unshift(result); Store.save("speech_articulation_results", results);
  document.getElementById("trainingView").classList.add("hidden"); document.getElementById("finishView").classList.remove("hidden");
  document.getElementById("finishText").textContent=`${selectedSubject.name} 대상자의 /${s.initialValue}/ 초성 단어 말하기 훈련 결과입니다.`;
  document.getElementById("summaryGrid").innerHTML=`<div class="summary-card total"><div class="summary-icon total">▣</div><span>전체 산출</span><strong>${total}</strong></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><span>정답</span><strong>${correct}</strong></div><div class="summary-card wrong"><div class="summary-icon wrong">×</div><span>오답</span><strong>${wrong}</strong></div><div class="summary-card rate"><div class="summary-icon rate">%</div><span>정답률</span><strong>${accuracy}%</strong></div>`;
}
