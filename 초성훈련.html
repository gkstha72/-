<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초성 단어 훈련</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Pretendard","Noto Sans KR",Arial,sans-serif; background:#f4f6fa; color:#162033; }
    .app { max-width:1120px; margin:0 auto; padding:24px 22px 48px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
    .brand { display:flex; align-items:center; gap:12px; font-size:22px; font-weight:900; }
    .logo { width:44px; height:44px; border-radius:14px; background:linear-gradient(135deg,#315cff,#37c4ff); color:white; display:grid; place-items:center; font-weight:900; }
    button { border:none; border-radius:14px; padding:12px 17px; font-size:15px; font-weight:900; cursor:pointer; }
    .primary { background:#246bfe; color:white; } .secondary { background:#eef3ff; color:#246bfe; } .gray { background:#edf1f6; color:#5d687b; }
    .blue { background:#246bfe; color:white; } .red { background:#e54848; color:white; }
    .panel { background:white; border:1px solid #e2e8f0; border-radius:24px; padding:22px; box-shadow:0 8px 24px rgba(15,30,60,.06); margin-bottom:20px; }
    .panel h2 { margin:0 0 16px; font-size:22px; }
    .setup-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    label { display:block; font-size:13px; font-weight:900; color:#475569; margin-bottom:7px; }
    input, select, textarea { width:100%; border:1px solid #dce3ef; border-radius:13px; padding:12px 13px; font-size:14px; outline:none; background:white; }
    textarea { min-height:74px; resize:vertical; }
    .subject-box, .help-box { background:#f8faff; border:1px solid #e2e8f0; border-radius:18px; padding:16px; margin-bottom:16px; color:#475569; line-height:1.6; }
    .help-box { margin-top:16px; font-size:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .stats-mini { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; font-size:13px; }
    .stats-mini div { background:white; border:1px solid #e2e8f0; border-radius:12px; padding:8px 10px; display:flex; justify-content:space-between; gap:6px; }
    .stats-mini b { color:#246bfe; }
    .word-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .item-card { background:#f8faff; border:1px solid #e2e8f0; border-radius:15px; padding:14px; font-size:16px; line-height:1.5; }
    .item-card strong { color:#246bfe; margin-right:5px; }
    .hidden { display:none !important; }
    .progress-line { height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin-bottom:18px; }
    .progress-bar { height:100%; width:0%; background:#246bfe; }
    .training-box { background:#f8faff; border-radius:24px; padding:42px 24px; text-align:center; margin-bottom:18px; min-height:300px; display:grid; place-items:center; }
    .training-title { font-size:22px; font-weight:900; color:#246bfe; margin-bottom:22px; }
    .stimulus { font-size:72px; font-weight:900; margin-bottom:0; word-break:keep-all; letter-spacing:-1px; }
    .question { color:#246bfe; font-size:26px; line-height:1.5; font-weight:900; text-align:center; margin-bottom:16px; }
    .cue-box { display:none; }
    .response-buttons { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .response-buttons button { min-height:68px; font-size:22px; }
    .response-buttons button.correct-choice { background:#16a06f; color:white; }
    .response-buttons button.wrong-choice { background:#e54848; color:white; }
    .result-panel { background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%); border-radius:24px; padding:16px; border:1px solid #edf2f7; box-shadow:0 10px 28px rgba(15,30,60,.05); }
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px; }
    .summary-card { background:white; border:1px solid #edf2f7; border-radius:20px; padding:22px 16px; text-align:center; box-shadow:0 8px 22px rgba(15,30,60,.06); }
    .summary-icon { width:40px; height:40px; border-radius:14px; display:grid; place-items:center; margin:0 auto 10px; color:white; font-size:22px; font-weight:900; }
    .summary-card strong { display:block; font-size:30px; line-height:1; margin-bottom:8px; font-weight:900; }
    .summary-card span { color:#334155; font-size:15px; font-weight:800; }
    .summary-card.total strong,.summary-card.rate strong { color:#246bfe; }
    .summary-card.correct strong { color:#16a06f; }
    .summary-card.wrong strong { color:#e54848; }
    .summary-icon.total,.summary-icon.rate { background:#246bfe; }
    .summary-icon.correct { background:#16a06f; }
    .summary-icon.wrong { background:#e54848; }
    @media (max-width:900px){ .setup-grid{grid-template-columns:1fr 1fr;} .word-grid{grid-template-columns:repeat(2,1fr);} .summary-grid,.response-buttons{grid-template-columns:1fr;} .topbar{align-items:flex-start; flex-direction:column;} }
    @media (max-width:560px){ .setup-grid,.word-grid{grid-template-columns:1fr;} .stimulus{font-size:52px;} .question{font-size:22px;} }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">초</div><span>초성 단어 훈련</span></div>
      <button class="gray" onclick="location.href='index.html'">메인으로</button>
    </header>

    <section class="panel">
      <h2>대상자</h2>
      <div id="subjectBox" class="subject-box"></div>
    </section>

    <section id="setupView" class="panel">
      <h2>훈련 설정</h2>
      <div class="setup-grid">
        <div>
          <label for="initialValue">초성</label>
          <select id="initialValue" onchange="generateMaterials(); renderWordStats()"></select>
        </div>
        <div>
          <label for="syllableLength">음절 수</label>
          <select id="syllableLength" onchange="generateMaterials(); renderWordStats()">
            <option value="all" selected>전체</option>
            <option value="2">2음절</option>
            <option value="3">3음절</option>
          </select>
        </div>
<div>
  <label for="count">개수</label>
  <select id="count" onchange="generateMaterials(); renderWordStats()">
    <option value="10" selected>10개</option>
    <option value="20">20개</option>
    <option value="30">30개</option>
    <option value="40">40개</option>
    <option value="50">50개</option>
  </select>
</div>
        <div>
          <label for="orderMode">제시 방식</label>
          <select id="orderMode" onchange="generateMaterials(); renderWordStats()">
            <option value="order" selected>순서대로</option>
            <option value="random">무작위</option>
          </select>
        </div>
      </div>
      <div class="help-box">
제시된 초성에 해당하는 단어를 떠올리고 말하는 훈련으로, 어휘 인출 능력과 음운 인식 능력 향상을 돕습니다.
      </div>
      <div class="actions">
        <button class="primary" onclick="generateMaterials()">자료 생성</button>
        <button class="secondary" onclick="startTraining()">훈련 시작</button>
      </div>
    </section>

    <section id="previewView" class="panel">
      <h2 id="previewTitle">생성 자료</h2>
      <div id="previewList" class="word-grid"></div>
    </section>

    <section id="wordStatsView" class="panel">
      <h2>초성별 보유 단어 수</h2>
      <div id="wordStatsBox"></div>
    </section>

    <section id="trainingView" class="panel hidden">
      <div id="question" class="question">초성 단어를 정확하게 말해보세요.</div>
      <div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
      <div class="training-box"><div>
        <div id="trainingTitle" class="training-title">1번 문항</div>
        <div id="stimulus" class="stimulus">가족</div>
        <div id="cueBox" class="cue-box"></div>
      </div></div>
      <div class="response-buttons">
        <button id="correctBtn" class="blue" onclick="recordReading('correct')">정답</button>
        <button id="wrongBtn" class="red" onclick="recordReading('wrong')">오답</button>
      </div>
      <div id="feedbackBox" style="display:none;margin-top:12px;padding:16px;border-radius:16px;font-size:24px;font-weight:900;text-align:center;"></div>
      <div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div>
    </section>

    <section id="finishView" class="panel hidden">
      <h2>훈련 결과</h2>
      <p id="finishText"></p>
      <div class="result-panel"><div id="summaryGrid" class="summary-grid"></div></div>
      <div class="actions">
        <button class="primary" onclick="location.href='index.html'">메인으로</button>
        <button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button>
      </div>
    </section>
  </main>

    function isHangul(char) { const code = char.charCodeAt(0); return code >= 0xAC00 && code <= 0xD7A3; }
    function decompose(char) {
      if (!isHangul(char)) return null;
      const code = char.charCodeAt(0) - 0xAC00;
      return { initial: INITIALS[Math.floor(code / 588)], medial: MEDIALS[Math.floor((code % 588) / 28)], final: code % 28 === 0 ? "" : FINALS[(code % 28) - 1] };
    }
    function countHangulSyllables(word) { return [...word].filter(isHangul).length; }
    function getInitial(word) { const first = [...word].find(isHangul); return first ? decompose(first).initial : ""; }
    function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }
    function unique(array) { return [...new Set(array)]; }

    function renderWordStats() {
      const box = document.getElementById("wordStatsBox");
      if (!box) return;
      const settings = getSettings();
      const counts = INITIALS.map(initial => {
        const words = unique(BASE_WORDS).filter(word => {
          const n = countHangulSyllables(word);
          const lengthOK = settings.syllableLength === "all" ? (n === 2 || n === 3) : n === Number(settings.syllableLength);
          return getInitial(word) === initial && lengthOK;
        });
        return { initial, total: words.length };
      });
      const totalAll = counts.reduce((sum, item) => sum + item.total, 0);
      const lengthLabel = settings.syllableLength === "all" ? "2·3음절" : `${settings.syllableLength}음절`;
      box.innerHTML = `<div class="help-box" style="margin-top:0;">현재 음절 설정 기준: ${lengthLabel} / 전체 ${totalAll}개</div><div class="stats-mini">${counts.map(item => `<div><span>${item.initial}</span><b>${item.total}개</b></div>`).join("")}</div>`;
    }

    function renderSubject() {
      const box = document.getElementById("subjectBox");
      if (!selectedSubject) {
        box.innerHTML = `선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`;
        return;
      }
      box.innerHTML = `<strong>${selectedSubject.name}</strong><br />${selectedSubject.number || "등록번호 없음"} · ${selectedSubject.gender} · ${selectedSubject.age}세<br />${selectedSubject.diagnosis || "진단명 미입력"} · ${selectedSubject.goal || "목표 미입력"}`;
    }

function renderInitialOptions() {
  const select = document.getElementById("initialValue");
  select.innerHTML = `<option value="all" selected>전체</option>` +
    INITIALS.map(value => `<option value="${value}">${value}</option>`).join("");
}

    function getSettings() {
      return {
        initialValue: document.getElementById("initialValue").value,
        count: Number(document.getElementById("count").value) || 10,
        syllableLength: document.getElementById("syllableLength").value,
        orderMode: document.getElementById("orderMode").value
      };
    }

    function buildMaterials() {
      const settings = getSettings();
      let matched = BASE_WORDS.filter(word => {
        const n = countHangulSyllables(word);
        const lengthOK = settings.syllableLength === "all" ? (n === 2 || n === 3) : n === Number(settings.syllableLength);
const initialOK = settings.initialValue === "all" || getInitial(word) === settings.initialValue;
return lengthOK && initialOK;
      });
      matched = unique(matched);
      const source = settings.orderMode === "random" ? shuffle(matched) : matched;
      return source.slice(0, Math.min(settings.count, source.length)).map(word => ({
        stimulus: word,
        question: `${settings.initialValue === "all" ? "전체" : settings.initialValue} 단어를 정확하게 말해보세요.`,
        cue: `첫소리: ${getInitial(word)} / 음절 수: ${countHangulSyllables(word)}음절`,
        answer: word
      }));
    }

    function generateMaterials() { materials = buildMaterials(); renderPreview(); }

    function renderPreview() {
      const settings = getSettings();
      const previewTitle = document.getElementById("previewTitle");
      const previewList = document.getElementById("previewList");
      const lengthLabel = settings.syllableLength === "all" ? "2·3음절" : `${settings.syllableLength}음절`;
      const initialLabel = settings.initialValue === "all" ? "전체 초성" : `${settings.initialValue} 초성`;
      previewTitle.textContent = `${initialLabel} · ${lengthLabel} 단어 ${materials.length}개`;
      if (materials.length === 0) {
        previewList.innerHTML = `<div class="item-card">해당 조건의 단어가 없습니다. 다른 초성이나 음절 수를 선택해 주세요.</div>`;
        return;
      }
      previewList.innerHTML = materials.map((item, index) => `<div class="item-card"><strong>${index + 1}.</strong>${item.stimulus}</div>`).join("");
    }

    function startTraining() {
      if (!selectedSubject) { alert("대상자를 먼저 등록하거나 선택해주세요."); location.href = "index.html"; return; }
      if (materials.length === 0) generateMaterials();
      if (materials.length === 0) return;
      currentIndex = 0; answers = []; choiceLocked = false; retryCount = 0;
      document.getElementById("setupView").classList.add("hidden");
      document.getElementById("previewView").classList.add("hidden");
      document.getElementById("wordStatsView").classList.add("hidden");
      document.getElementById("trainingView").classList.remove("hidden");
      document.getElementById("finishView").classList.add("hidden");
      renderTrainingItem();
    }

    function renderTrainingItem() {
      const item = materials[currentIndex]; cueShown = false;
      document.getElementById("progressBar").style.width = `${(currentIndex / materials.length) * 100}%`;
      document.getElementById("trainingTitle").textContent = `${currentIndex + 1} / ${materials.length}`;
      document.getElementById("stimulus").textContent = item.stimulus;
      document.getElementById("question").textContent = item.question;
      document.getElementById("cueBox").style.display = "none";
      document.getElementById("cueBox").textContent = item.cue;
      

      choiceLocked = false;
      retryCount = 0;

      const feedbackBox = document.getElementById("feedbackBox");
      if (feedbackBox) {
        feedbackBox.style.display = "none";
        feedbackBox.textContent = "";
      }

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.style.display = "none";

      const correctBtn = document.getElementById("correctBtn");
      const wrongBtn = document.getElementById("wrongBtn");
      if (correctBtn) {
        correctBtn.disabled = false;
        correctBtn.classList.remove("correct-choice", "wrong-choice");
      }
      if (wrongBtn) {
        wrongBtn.disabled = false;
        wrongBtn.classList.remove("correct-choice", "wrong-choice");
      }
    }

    function showFeedback(message, isCorrectStyle) {
      const feedbackBox = document.getElementById("feedbackBox");
      feedbackBox.style.display = "block";
      feedbackBox.textContent = message;
      feedbackBox.style.background = isCorrectStyle ? "#e8fff4" : "#fff1f1";
      feedbackBox.style.color = isCorrectStyle ? "#16a06f" : "#e54848";
      feedbackBox.style.border = isCorrectStyle ? "1px solid #a7f3d0" : "1px solid #fecaca";
    }

    function setResponseButtonsDisabled(disabled) {
      document.getElementById("correctBtn").disabled = disabled;
      document.getElementById("wrongBtn").disabled = disabled;
    }

    function recordReading(type) {
      if (choiceLocked) return;

      if (type === "correct") {
        choiceLocked = true;
        setResponseButtonsDisabled(true);
        document.getElementById("correctBtn").classList.add("correct-choice");

        const countedCorrect = retryCount === 0;
        showFeedback("정답입니다.", true);

        setTimeout(() => recordAnswer(countedCorrect ? "correct" : "wrong", retryCount), 1200);
        return;
      }

      retryCount += 1;

      if (retryCount === 1) {
        document.getElementById("wrongBtn").classList.add("wrong-choice");
        showFeedback("다시 말해보세요.", false);

        setTimeout(() => {
          document.getElementById("wrongBtn").classList.remove("wrong-choice");
        }, 800);
        return;
      }

      choiceLocked = true;
      setResponseButtonsDisabled(true);
      document.getElementById("wrongBtn").classList.add("wrong-choice");
      showFeedback("정답을 알려준 뒤 다음 문제를 눌러주세요.", false);
      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestionManual() {
      if (!choiceLocked) return;
      recordAnswer("wrong", retryCount);
    }

    function recordAnswer(type, retry) {
      const item = materials[currentIndex];
answers.push({ stimulus:item.stimulus, answer:item.answer, response:type, retry: retry || 0, cueShown, recordedAt:new Date().toISOString() });
      currentIndex += 1;
      if (currentIndex >= materials.length) finishTraining(); else renderTrainingItem();
    }

    function finishTraining() {
      const settings = getSettings();
      const total = answers.length;
      const correct = answers.filter(item => item.response === "correct").length;
      const wrong = answers.filter(item => item.response === "wrong").length;
      const accuracy = total ? Math.round((correct / total) * 100) : 0;
      const result = {
        id:`IC${Date.now()}`,
        subjectId:selectedSubject.id,
        subjectName:selectedSubject.name,
        subjectNumber:selectedSubject.number,
        program:"초성 단어 훈련",
        targetType:"initial",
        targetTypeName:"초성",
        targetValue:settings.initialValue,
        level:"word",
        syllableLength:settings.syllableLength,
        total, correct, wrong, accuracy, answers,
        createdAt:new Date().toISOString(),
        displayDate:new Date().toLocaleString()
      };
      const results = Store.load("speech_articulation_results", []);
      results.unshift(result); Store.save("speech_articulation_results", results);
      document.getElementById("trainingView").classList.add("hidden");
      document.getElementById("finishView").classList.remove("hidden");
      document.getElementById("finishText").textContent = `${selectedSubject.name} 대상자의 /${settings.initialValue}/ 초성 단어 훈련 결과입니다.`;
      document.getElementById("summaryGrid").innerHTML = `<div class="summary-card total"><div class="summary-icon total">▣</div><span>전체 문항</span><strong>${total}</strong></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><span>정답</span><strong>${correct}</strong></div><div class="summary-card wrong"><div class="summary-icon wrong">×</div><span>오답</span><strong>${wrong}</strong></div><div class="summary-card rate"><div class="summary-icon rate">%</div><span>정답률</span><strong>${accuracy}%</strong></div>`;
    }

    renderSubject();
    renderInitialOptions();
    renderWordStats();
    generateMaterials();
  </script>
</body>
</html>
