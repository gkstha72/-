<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조음교대 훈련</title>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Pretendard","Noto Sans KR",Arial,sans-serif; background:#f4f6fa; color:#162033; }
    .app { max-width:1120px; margin:0 auto; padding:24px 22px 48px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
    .brand { display:flex; align-items:center; gap:12px; font-size:22px; font-weight:900; }
    .logo { width:44px; height:44px; border-radius:14px; background:linear-gradient(135deg,#315cff,#37c4ff); color:white; display:grid; place-items:center; font-weight:900; }
    button { border:none; border-radius:14px; padding:12px 17px; font-size:15px; font-weight:900; cursor:pointer; }
    .primary { background:#246bfe; color:white; }
    .secondary { background:#eef3ff; color:#246bfe; }
    .gray { background:#edf1f6; color:#5d687b; }
    .blue { background:#246bfe; color:white; }
    .red { background:#e54848; color:white; }
    .panel { background:white; border:1px solid #e2e8f0; border-radius:24px; padding:22px; box-shadow:0 8px 24px rgba(15,30,60,.06); margin-bottom:20px; }
    .panel h2 { margin:0 0 16px; font-size:22px; }
    .setup-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    label { display:block; font-size:13px; font-weight:900; color:#475569; margin-bottom:7px; }
    select, textarea { width:100%; border:1px solid #dce3ef; border-radius:13px; padding:12px 13px; font-size:14px; outline:none; background:white; }
    textarea { min-height:74px; resize:vertical; }
    .subject-box,.help-box { background:#f8faff; border:1px solid #e2e8f0; border-radius:18px; padding:16px; margin-bottom:16px; color:#475569; line-height:1.6; }
    .help-box { margin-top:16px; font-size:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .word-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .item-card { background:#f8faff; border:1px solid #e2e8f0; border-radius:16px; padding:14px; font-size:15px; line-height:1.45; }
    .item-card strong { color:#246bfe; margin-right:5px; }
    .tag { display:inline-block; margin-left:6px; padding:3px 8px; border-radius:999px; background:#eef3ff; color:#246bfe; font-size:12px; font-weight:900; }
    .hidden { display:none !important; }
    .progress-line { height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin-bottom:18px; }
    .progress-bar { height:100%; width:0%; background:#246bfe; }
    .question { color:#246bfe; font-size:26px; line-height:1.5; font-weight:900; text-align:center; margin-bottom:16px; }
    .training-box { background:#f8faff; border-radius:24px; padding:42px 24px; text-align:center; margin-bottom:18px; min-height:340px; display:grid; place-items:center; }
    .training-title { font-size:22px; font-weight:900; color:#246bfe; margin-bottom:18px; }
    .target { font-size:74px; font-weight:900; line-height:1.25; word-break:keep-all; letter-spacing:-1px; }
    .target.sentence { font-size:42px; line-height:1.45; max-width:900px; margin:0 auto; }
    .guide { display:none !important; }
    
    .rating-box { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .rating-box button { min-height:72px; font-size:24px; }
    .feedback { display:none; margin-top:12px; padding:16px; border-radius:16px; font-size:24px; font-weight:900; text-align:center; }
    .feedback.correct { background:#e8fff4; color:#16a06f; border:1px solid #a7f3d0; }
    .feedback.wrong { background:#fff1f1; color:#e54848; border:1px solid #fecaca; }
    .summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:14px; }
    .summary-card { background:white; border:1px solid #edf2f7; border-radius:20px; padding:22px 16px; text-align:center; box-shadow:0 8px 22px rgba(15,30,60,.06); }
    .summary-icon { width:40px; height:40px; border-radius:14px; display:grid; place-items:center; margin:0 auto 10px; color:white; font-size:22px; font-weight:900; }
    .summary-card strong { display:block; font-size:30px; line-height:1; margin-bottom:8px; font-weight:900; }
    .summary-card span { color:#334155; font-size:15px; font-weight:800; }
    .summary-card.total strong,.summary-card.rate strong { color:#246bfe; }
    .summary-card.correct strong { color:#16a06f; }
    .summary-card.wrong strong { color:#e54848; }
    .summary-icon.total,.summary-icon.rate { background:#246bfe; }
    .summary-icon.correct { background:#16a06f; }
    .summary-icon.wrong { background:#e54848; }
    @media (max-width:900px){ .setup-grid{grid-template-columns:1fr 1fr;} .word-grid{grid-template-columns:repeat(2,1fr);} .summary-grid{grid-template-columns:repeat(2,1fr);} .topbar{align-items:flex-start; flex-direction:column;} }
    @media (max-width:560px){ .setup-grid,.word-grid,.rating-box,.summary-grid{grid-template-columns:1fr;} .target{font-size:52px;} .target.sentence{font-size:30px;} .question{font-size:22px;} }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">조</div><span>조음교대 훈련</span></div>
      <button class="gray" onclick="location.href='index.html'">메인으로</button>
    </header>

    <section class="panel">
      <h2>대상자</h2>
      <div id="subjectBox" class="subject-box"></div>
    </section>

    <section id="setupView" class="panel">
      <h2>훈련 설정</h2>
      <div class="setup-grid">
        <div>
          <label for="trainingType">훈련 유형</label>
          <select id="trainingType" onchange="generateMaterials(); renderStats();">
            <option value="all" selected>전체 혼합</option>
            <option value="AMR">동일 음절 AMR</option>
            <option value="SMR">연속 음절 SMR</option>
            <option value="문장">문장 반복</option>
          </select>
        </div>
        <div>
          <label for="count">개수</label>
          <select id="count" onchange="generateMaterials()">
            <option value="10" selected>10개</option>
            <option value="20">20개</option>
            <option value="all">전체</option>
          </select>
        </div>
        <div>
          <label for="orderMode">제시 방식</label>
          <select id="orderMode" onchange="generateMaterials()">
            <option value="random" selected>무작위</option>
            <option value="order">순서대로</option>
          </select>
        </div>
      </div>
      <div class="help-box">
        조음기관의 빠르고 정확한 움직임을 연습하는 훈련입니다. 동일 음절 반복(AMR), 연속 음절 반복(SMR), 문장 반복 훈련을 선택할 수 있습니다.
      </div>
      <div class="actions">
        <button class="primary" onclick="generateMaterials()">자료 생성</button>
        <button class="secondary" onclick="startTraining()">훈련 시작</button>
      </div>
    </section>

    <section id="previewView" class="panel">
      <h2 id="previewTitle">생성 자료</h2>
      <div id="previewList" class="word-grid"></div>
    </section>

    <section id="statsView" class="panel">
      <h2>유형별 문항 수</h2>
      <div id="statsBox"></div>
    </section>

    <section id="trainingView" class="panel hidden">
      <div id="question" class="question">제시된 음절 또는 문장을 또박또박 반복해보세요.</div>
      <div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
      <div class="training-box">
        <div>
          <div id="trainingTitle" class="training-title">1번 문항</div>
          <div id="targetText" class="target"></div>
          <div id="guideText" class="guide"></div>
        </div>
      </div>

      <div class="rating-box">
        <button id="correctBtn" class="blue" onclick="recordAnswer('correct')">정확</button>
        <button id="wrongBtn" class="red" onclick="recordAnswer('wrong')">부정확</button>
      </div>
      <div id="feedbackBox" class="feedback"></div>
      <div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 항목</button></div>
      
    </section>

    <section id="finishView" class="panel hidden">
      <h2>훈련 결과</h2>
      <p id="finishText"></p>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="actions">
        <button class="primary" onclick="location.href='index.html'">메인으로</button>
        <button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button>
      </div>
    </section>
  </main>

  <script>

    };

            "type": "문장",
            "target": "신진 샹송 가수의 신춘 샹송 쇼.",
            "label": "텅 트위스터",
            "guide": "ㅅ, ㅈ, ㅊ 소리를 구분합니다."
      },
      {
            "type": "문장",
            "target": "상표 붙인 큰 깡통은 깐 깡통인가 안 깐 깡통인가.",
            "label": "텅 트위스터",
            "guide": "ㄲ과 ㅋ, ㄴ 받침을 정확히 읽습니다."
      },
      {
            "type": "문장",
            "target": "서울특별시 특허허가과 허가과장 허 과장.",
            "label": "텅 트위스터",
            "guide": "ㅎ과 ㄱ 연결을 또박또박 읽습니다."
      },
      {
            "type": "문장",
            "target": "중앙청 창살은 쌍창살이고 시청 창살은 외창살이다.",
            "label": "텅 트위스터",
            "guide": "ㅊ, ㅆ, ㅅ을 구분해 읽습니다."
      },
      {
            "type": "문장",
            "target": "앞집 팥죽은 붉은 팥 풋팥죽이고 뒷집 콩죽은 검은 콩 깨죽이다.",
            "label": "텅 트위스터",
            "guide": "ㅍ, ㅂ, ㄱ 소리를 분명히 합니다."
      },
      {
            "type": "문장",
            "target": "작은 토끼 토끼통 옆 큰 토끼 토끼통.",
            "label": "텅 트위스터",
            "guide": "ㅌ과 ㄲ 소리를 구분합니다."
      },
      {
            "type": "문장",
            "target": "철수는 철창살 사이로 찰칵찰칵 사진을 찍었습니다.",
            "label": "ㅊ 반복",
            "guide": "긴 문장에서도 ㅊ 소리를 유지합니다."
      },
      {
            "type": "문장",
            "target": "강가의 갈대가 가을바람에 가볍게 흔들렸습니다.",
            "label": "ㄱ 반복",
            "guide": "ㄱ과 ㄹ 연결을 부드럽게 합니다."
      }
];

    let materials = [];
    let currentIndex = 0;
    let answers = [];
    let choiceLocked = false;
    let retryCount = 0;

    function unique(array) { return [...new Set(array)]; }
    function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }

    function renderSubject() {
      const box = document.getElementById("subjectBox");
      if (!selectedSubject) {
        box.innerHTML = `선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`;
        return;
      }
      box.innerHTML = `<strong>${selectedSubject.name}</strong><br />${selectedSubject.number || ""} ${selectedSubject.memo ? " · " + selectedSubject.memo : ""}`;
    }

    function filteredDB() {
      const type = document.getElementById("trainingType").value;
      return ITEM_DB.filter(item => type === "all" || item.type === type);
    }

    function generateMaterials() {
      const countValue = document.getElementById("count").value;
      const orderMode = document.getElementById("orderMode").value;
      let source = filteredDB();
      source = orderMode === "random" ? shuffle(source) : [...source];
      const limit = countValue === "all" ? source.length : Number(countValue);
      materials = source.slice(0, Math.min(limit, source.length)).map((item, idx) => ({...item, no:idx+1}));
      currentIndex = 0;
      answers = [];
      renderPreview();
      renderStats();
    }

    function renderPreview() {
      document.getElementById("previewTitle").textContent = `생성 자료 ${materials.length}개`;
      const list = document.getElementById("previewList");
      if (!materials.length) {
        list.innerHTML = `<div class="item-card">조건에 맞는 자료가 없습니다.</div>`;
        return;
      }
      list.innerHTML = materials.map((item, idx) => `<div class="item-card"><strong>${idx+1}.</strong>${item.target}<br><span class="tag">${item.type}</span></div>`).join("");
    }

    function renderStats() {
      const source = filteredDB();
      const amr = source.filter(v => v.type === "AMR").length;
      const smr = source.filter(v => v.type === "SMR").length;
      const sent = source.filter(v => v.type === "문장").length;
      document.getElementById("statsBox").innerHTML = `<div class="word-grid"><div class="item-card"><strong>전체</strong>${source.length}</div><div class="item-card"><strong>AMR</strong>${amr}</div><div class="item-card"><strong>SMR</strong>${smr}</div><div class="item-card"><strong>문장</strong>${sent}</div></div>`;
    }

    function startTraining() {
      if (!materials.length) generateMaterials();
      if (!materials.length) return;
      document.getElementById("setupView").classList.add("hidden");
      document.getElementById("previewView").classList.add("hidden");
      document.getElementById("statsView").classList.add("hidden");
      document.getElementById("trainingView").classList.remove("hidden");
      document.getElementById("finishView").classList.add("hidden");
      currentIndex = 0;
      answers = [];
      showItem();
    }


    function showItem() {
      choiceLocked = false;
      retryCount = 0;
      const item = materials[currentIndex];
      document.getElementById("trainingTitle").textContent = `${currentIndex + 1} / ${materials.length}`;
      const target = document.getElementById("targetText");
      target.textContent = item.target;
      target.className = item.type === "문장" ? "target sentence" : "target";
      
      document.getElementById("progressBar").style.width = `${(currentIndex / materials.length) * 100}%`;
      
      document.getElementById("feedbackBox").style.display = "none";
      document.getElementById("feedbackBox").textContent = "";
      document.getElementById("feedbackBox").className = "feedback";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("correctBtn").disabled = false;
      document.getElementById("wrongBtn").disabled = false;
    }
function showFeedback(message, isCorrectStyle) {
      const feedbackBox = document.getElementById("feedbackBox");
      feedbackBox.style.display = "block";
      feedbackBox.textContent = message;
      feedbackBox.className = "feedback " + (isCorrectStyle ? "correct" : "wrong");
    }

    function setRatingDisabled(disabled) {
      document.getElementById("correctBtn").disabled = disabled;
      document.getElementById("wrongBtn").disabled = disabled;
    }

    function recordAnswer(result) {
      if (choiceLocked) return;
      
      const item = materials[currentIndex];

      if (result === "correct") {
          choiceLocked = true;
        setRatingDisabled(true);
        showFeedback("정확합니다.", true);
        const countedCorrect = retryCount === 0;
        answers.push({ target:item.target, type:item.type, label:item.label, response:"정확", correct:countedCorrect, retry:retryCount });
        setTimeout(nextItem, 1200);
        return;
      }

      retryCount += 1;

      if (retryCount === 1) {
        showFeedback("천천히 다시 해보세요.", false);
        return;
      }

      choiceLocked = true;
      setRatingDisabled(true);
      showFeedback(`모델을 들려준 뒤 다음 항목으로 진행하세요. 목표: "${item.target}"`, false);
      answers.push({ target:item.target, type:item.type, label:item.label, response:"부정확", correct:false, retry:retryCount });
      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestionManual() {
      if (!choiceLocked) return;
      nextItem();
    }

    function nextItem() {
      currentIndex++;
      if (currentIndex >= materials.length) finishTraining();
      else showItem();
    }

    function finishTraining() {
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("trainingView").classList.add("hidden");
      document.getElementById("finishView").classList.remove("hidden");
      const total = answers.length;
      const correct = answers.filter(a => a.correct).length;
      const wrong = total - correct;
      const rate = total ? Math.round((correct / total) * 100) : 0;
      const subjectName = selectedSubject ? selectedSubject.name : "대상자";
      document.getElementById("finishText").textContent = `${subjectName}님의 ${TRAINING_NAME} 결과입니다.`;
      document.getElementById("summaryGrid").innerHTML = `
        <div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 항목</span></div>
        <div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정확</span></div>
        <div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>부정확</span></div>
        <div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정확률</span></div>`;
      const history = Store.load("speech_training_history", []);
      history.push({ id:Date.now(), subjectId:selectedSubjectId, subjectName, training:TRAINING_NAME, date:new Date().toISOString(), total, correct, wrong, rate, answers });
      Store.save("speech_training_history", history);
    }

    renderSubject();
    generateMaterials();
    renderStats();
  </script>
