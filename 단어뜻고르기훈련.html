      </div>

      <div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>

    function pickUnique(pool, count, excludeWords) {

        if (!exclude.has(item.answer) && !picked.includes(item.answer)) {

        }
        if (picked.length >= count) break;

      return picked;

    function pickDifferentCategoryChoices(item, count, excludeWords) {
      const exclude = new Set(excludeWords || []);
      const picked = [];
      const otherCategories = shuffle(getCategories().filter(category => category !== item.category));

      // 먼저 서로 다른 범주에서 1개씩 뽑아, '범주 다르게' 난이도가 더 명확하게 보이도록 함
      otherCategories.forEach(category => {

        const pool = DESCRIPTION_DB.filter(x => x.category === category && !exclude.has(x.answer));
        const one = pickUnique(pool, 1, [...exclude]);
        if (one.length) {
          picked.push(one[0]);

      // 범주 수가 부족하거나 중복 단어 때문에 모자라면 다른 범주 전체에서 보충
