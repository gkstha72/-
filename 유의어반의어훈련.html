<!DOCTYPE html>

    button { border:none; border-radius:14px; padding:12px 17px; font-size:15px; font-weight:900; cursor:pointer; }
    .primary { background:#246bfe; color:white; } .secondary { background:#eef3ff; color:#246bfe; } .gray { background:#edf1f6; color:#5d687b; }

    .panel { background:white; border:1px solid #e2e8f0; border-radius:24px; padding:22px; box-shadow:0 8px 24px rgba(15,30,60,.06); margin-bottom:20px; }
    .panel h2 { margin:0 0 16px; font-size:22px; }
    .setup-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
    label { display:block; font-size:13px; font-weight:900; color:#475569; margin-bottom:7px; }
    select, textarea { width:100%; border:1px solid #dce3ef; border-radius:13px; padding:12px 13px; font-size:14px; outline:none; background:white; }
    textarea { min-height:74px; resize:vertical; }
    .subject-box, .help-box { background:#f8faff; border:1px solid #e2e8f0; border-radius:18px; padding:16px; margin-bottom:16px; color:#475569; line-height:1.6; }
    .help-box { margin-top:16px; font-size:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .word-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .item-card { background:#f8faff; border:1px solid #e2e8f0; border-radius:15px; padding:14px; font-size:15px; line-height:1.5; }
    .item-card strong { color:#246bfe; margin-right:5px; }
    .tag { display:inline-block; margin-left:6px; padding:3px 8px; border-radius:999px; background:#eef3ff; color:#246bfe; font-size:12px; font-weight:900; }
    .type-tag { display:inline-block; margin-left:6px; padding:3px 8px; border-radius:999px; font-size:12px; font-weight:900; }
    .syn { background:#e9f9f2; color:#16a06f; } .ant { background:#fff0f0; color:#e54848; }
    .hidden { display:none !important; }
    .progress-line { height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin-bottom:18px; }
    .progress-bar { height:100%; width:0%; background:#246bfe; }
    .question { color:#246bfe; font-size:25px; line-height:1.5; font-weight:900; text-align:center; margin-bottom:16px; }
    .training-box { background:#f8faff; border-radius:24px; padding:38px 24px; text-align:center; margin-bottom:18px; min-height:300px; display:grid; place-items:center; }
    .training-title { font-size:22px; font-weight:900; color:#246bfe; margin-bottom:22px; }
    .target-word { font-size:72px; font-weight:900; line-height:1.1; word-break:keep-all; letter-spacing:-1px; }
    .hint-line { display:none; }
    .mode-label { display:inline-block; padding:8px 18px; border-radius:999px; margin-top:30px; font-size:17px; font-weight:900; background:white; border:1px solid #dbe7ff; color:#246bfe; }
    .answer-options { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:12px; }
    .answer-btn { background:#eef3ff; color:#246bfe; border:1px solid #dbe7ff; border-radius:16px; min-height:68px; padding:15px 12px; font-size:24px; font-weight:900; }
    .answer-btn:hover { background:#dfeaff; }
    .answer-btn.correct-choice { background:#16a06f; color:white; border-color:#16a06f; }
    .answer-btn.wrong-choice { background:#e54848; color:white; border-color:#e54848; }

    #feedbackBox.wrong { background:#fff1f1; color:#e54848; border:1px solid #fecaca; }
    .oral-box button.correct-choice { background:#16a06f; color:white; }
    .oral-box button.wrong-choice { background:#e54848; color:white; }

    .result-panel { background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%); border-radius:24px; padding:16px; border:1px solid #edf2f7; box-shadow:0 10px 28px rgba(15,30,60,.05); }
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px; }

<body>
  <main class="app">
    <header class="topbar"><div class="brand"><div class="logo">뜻</div><span>유의어·반의어 훈련</span></div><button class="gray" onclick="location.href='index.html'">메인으로</button></header>
    <section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>
    <section id="setupView" class="panel"><h2>훈련 설정</h2>
      <div class="setup-grid">
        <div><label for="relationMode">훈련 유형</label><select id="relationMode" onchange="generateMaterials(); renderStats()"><option value="mixed" selected>유의어+반의어 혼합</option><option value="synonym">유의어만</option><option value="antonym">반의어만</option></select></div>
        <div><label for="responseMode">응답 방식</label><select id="responseMode" onchange="generateMaterials()"><option value="choice" selected>보기 선택형</option><option value="oral">표현형(정오답 기록)</option></select></div>
        <div><label for="count">개수</label><select id="count" onchange="generateMaterials()"><option value="10" selected>10개</option><option value="20">20개</option><option value="30">30개</option><option value="40">40개</option><option value="50">50개</option></select></div>
        <div><label for="choiceCount">보기 개수</label><select id="choiceCount" onchange="generateMaterials()"><option value="2" selected>2개 보기</option><option value="4">4개 보기</option></select></div>
        <div><label for="orderMode">제시 방식</label><select id="orderMode" onchange="generateMaterials()"><option value="random" selected>무작위</option><option value="order">순서대로</option></select></div>
      </div>
      <div class="help-box">제시된 어휘를 듣거나 읽은 뒤, 같은 뜻의 말(유의어) 또는 반대 뜻의 말(반의어)을 찾거나 말하는 훈련입니다. 어휘 이해, 의미 연결, 표현 능력 평가에 활용할 수 있습니다.</div>
      <div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
    </section>
    <section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
    <section id="statsView" class="panel"><h2>유형별 문항 수</h2><div id="statsBox"></div></section>
    <section id="trainingView" class="panel hidden"><div id="question" class="question">제시어와 알맞은 관계의 단어를 고르세요.</div><div class="progress-line"><div id="progressBar" class="progress-bar"></div></div><div class="training-box"><div><div id="trainingTitle" class="training-title">1번 문항</div><div id="targetWord" class="target-word"></div><div id="hintLine" class="hint-line"></div><div id="modeLabel" class="mode-label"></div></div></div><div id="answerOptions" class="answer-options"></div><div id="oralBox" class="oral-box hidden"><button id="oralCorrectBtn" class="blue" onclick="recordOralAnswer('correct')">정답</button><button id="oralWrongBtn" class="red" onclick="recordOralAnswer('wrong')">오답</button></div><div id="feedbackBox" style="display:none;margin-top:12px;padding:16px;border-radius:16px;font-size:24px;font-weight:900;text-align:center;"></div><div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div></section>
    <section id="finishView" class="panel hidden"><h2>훈련 결과</h2><p id="finishText"></p><div class="result-panel"><div id="summaryGrid" class="summary-grid"></div></div><div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div></section>
  </main>

            "options": [
                  "낯설다",
                  "차 있다",
                  "무덥다",
                  "습하다"
            ]
      },
      {
            "type": "antonym",
            "word": "비어 있다",
            "answer": "차 있다",
            "pair": "차 있다",
            "options": [
                  "차 있다",
                  "무덥다",
                  "습하다",
                  "작다"
            ]
      },
      {
            "type": "antonym",
            "word": "서늘하다",
            "answer": "무덥다",
            "pair": "무덥다",
            "options": [
                  "무덥다",
                  "습하다",
                  "작다",
                  "낮다"
            ]
      },
      {
            "type": "antonym",
            "word": "건조하다",
            "answer": "습하다",
            "pair": "습하다",
            "options": [
                  "습하다",
                  "작다",
                  "낮다",
                  "짧다"
            ]
      }
];

    let materials = [];
    let currentIndex = 0;
    let answers = [];
    let choiceLocked = false;
    let retryCount = 0;

    function unique(array) { return [...new Set(array)]; }
    function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }
    function typeLabel(type) { return type === "synonym" ? "유의어" : "반의어"; }
    function typeClass(type) { return type === "synonym" ? "syn" : "ant"; }

    function renderSubject() {
      const box = document.getElementById("subjectBox");
      if (!selectedSubject) { box.innerHTML = `선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`; return; }
      box.innerHTML = `<strong>${selectedSubject.name}</strong><br />${selectedSubject.number || ""} ${selectedSubject.memo ? " · " + selectedSubject.memo : ""}`;
    }

    function filteredDB() {
      const mode = document.getElementById("relationMode").value;
      if (mode === "synonym") return PAIR_DB.filter(item => item.type === "synonym");
      if (mode === "antonym") return PAIR_DB.filter(item => item.type === "antonym");
      return PAIR_DB;
    }

    function buildOptions(item) {
      const choiceCount = Number(document.getElementById("choiceCount").value) === 4 ? 4 : 2;
      let pool = [];
      if (item.options && item.options.length) pool = item.options.filter(v => v !== item.answer);
      const allAnswers = PAIR_DB.map(v => v.answer).filter(v => v !== item.answer && v !== item.word);
      const allWords = PAIR_DB.map(v => v.word).filter(v => v !== item.answer && v !== item.word);
      pool = unique([...pool, ...shuffle(allAnswers), ...shuffle(allWords)]);
      return shuffle(unique([item.answer, ...pool]).slice(0, choiceCount));
    }

    function generateMaterials() {
      const count = Number(document.getElementById("count").value);
      const orderMode = document.getElementById("orderMode").value;
      let source = filteredDB();
      source = orderMode === "random" ? shuffle(source) : [...source];
      materials = source.slice(0, Math.min(count, source.length)).map((item, idx) => ({...item, no: idx + 1, choices: buildOptions(item)}));
      currentIndex = 0; answers = [];
      renderPreview(); renderStats();
    }

    function renderPreview() {
      document.getElementById("previewTitle").textContent = `생성 자료 ${materials.length}개`;
      const list = document.getElementById("previewList");
      list.innerHTML = materials.map((item, idx) => `<div class="item-card"><strong>${idx + 1}.</strong>${item.word} → ${item.answer}<span class="type-tag ${typeClass(item.type)}">${typeLabel(item.type)}</span></div>`).join("");
    }

    function renderStats() {
      const source = filteredDB();
      const syn = source.filter(v => v.type === "synonym").length;
      const ant = source.filter(v => v.type === "antonym").length;
      document.getElementById("statsBox").innerHTML = `<div class="stats-mini"><div><span>전체</span><b>${source.length}</b></div><div><span>유의어</span><b>${syn}</b></div><div><span>반의어</span><b>${ant}</b></div><div><span>선택 자료</span><b>${materials.length}</b></div><div><span>보기</span><b>${document.getElementById("choiceCount").value}개</b></div></div>`;
    }

    function startTraining() {
      if (!materials.length) generateMaterials();
      document.getElementById("setupView").classList.add("hidden");
      document.getElementById("previewView").classList.add("hidden");
      document.getElementById("statsView").classList.add("hidden");
      document.getElementById("trainingView").classList.remove("hidden");
      showItem();
    }

    function showItem() {
      choiceLocked = false;
      retryCount = 0;
      const item = materials[currentIndex];
      const responseMode = document.getElementById("responseMode").value;
      document.getElementById("trainingTitle").textContent = `${currentIndex + 1} / ${materials.length}`;
      document.getElementById("targetWord").textContent = item.word;
      document.getElementById("hintLine").textContent = "";
      document.getElementById("modeLabel").textContent = typeLabel(item.type);
      document.getElementById("modeLabel").className = `mode-label ${typeClass(item.type)}`;
      document.getElementById("progressBar").style.width = `${((currentIndex) / materials.length) * 100}%`;
      
      const feedbackBox = document.getElementById("feedbackBox");
      if (feedbackBox) {
        feedbackBox.style.display = "none";
        feedbackBox.textContent = "";
        feedbackBox.className = "";
      }
      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.style.display = "none";
      const oralCorrectBtn = document.getElementById("oralCorrectBtn");
      const oralWrongBtn = document.getElementById("oralWrongBtn");
      if (oralCorrectBtn) { oralCorrectBtn.disabled = false; oralCorrectBtn.classList.remove("correct-choice", "wrong-choice"); }
      if (oralWrongBtn) { oralWrongBtn.disabled = false; oralWrongBtn.classList.remove("correct-choice", "wrong-choice"); }
      if (responseMode === "oral") {
        document.getElementById("answerOptions").classList.add("hidden");
        document.getElementById("oralBox").classList.remove("hidden");
      } else {
        document.getElementById("answerOptions").classList.remove("hidden");
        document.getElementById("oralBox").classList.add("hidden");
        document.getElementById("answerOptions").innerHTML = item.choices.map(choice => `<button class="answer-btn" onclick="selectAnswer(this, '${choice.replace(/'/g,"\\'")}')">${choice}</button>`).join("");
      }
    }


    function showFeedback(message, isCorrectStyle) {
      const feedbackBox = document.getElementById("feedbackBox");
      feedbackBox.style.display = "block";
      feedbackBox.textContent = message;
      feedbackBox.className = isCorrectStyle ? "correct" : "wrong";
    }

    function setAnswerButtonsDisabled(disabled) {
      document.querySelectorAll(".answer-btn").forEach(btn => {
        btn.disabled = disabled;
      });
    }

    function markChoiceResult(selectedButton, selectedChoice) {
      const item = materials[currentIndex];
      document.querySelectorAll(".answer-btn").forEach(btn => {
        if (btn.textContent === item.answer) btn.classList.add("correct-choice");
        if (btn === selectedButton && selectedChoice !== item.answer) btn.classList.add("wrong-choice");
      });
    }

    function setOralButtonsDisabled(disabled) {
      const correctBtn = document.getElementById("oralCorrectBtn");
      const wrongBtn = document.getElementById("oralWrongBtn");
      if (correctBtn) correctBtn.disabled = disabled;
      if (wrongBtn) wrongBtn.disabled = disabled;
    }
function selectAnswer(button, choice) {
      if (choiceLocked) return;
      
      const item = materials[currentIndex];
      const isCorrect = choice === item.answer;

      if (isCorrect) {
        choiceLocked = true;
        setAnswerButtonsDisabled(true);
        markChoiceResult(button, choice);
        showFeedback("정답입니다.", true);
        const countedCorrect = retryCount === 0;
        answers.push({ word:item.word, type:item.type, answer:item.answer, response:choice, correct:countedCorrect, retry:retryCount });
        setTimeout(nextItem, 1200);
        return;
      }

      retryCount += 1;

      if (retryCount === 1) {
        button.classList.add("wrong-choice");
        showFeedback("다시 풀어보세요.", false);
        setTimeout(() => button.classList.remove("wrong-choice"), 800);
        return;
      }

      choiceLocked = true;
      setAnswerButtonsDisabled(true);
      markChoiceResult(button, choice);
      showFeedback(`정답은 "${item.answer}"입니다. 다음 문제를 눌러주세요.`, false);
      answers.push({ word:item.word, type:item.type, answer:item.answer, response:choice, correct:false, retry:retryCount });
      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function recordOralAnswer(result) {
      if (choiceLocked) return;
      
      const item = materials[currentIndex];

      if (result === "correct") {
        choiceLocked = true;
        setOralButtonsDisabled(true);
        document.getElementById("oralCorrectBtn").classList.add("correct-choice");
        showFeedback("정답입니다.", true);
        const countedCorrect = retryCount === 0;
        answers.push({ word:item.word, type:item.type, answer:item.answer, response:"", correct:countedCorrect, retry:retryCount });
        setTimeout(nextItem, 1200);
        return;
      }

      retryCount += 1;

      if (retryCount === 1) {
        document.getElementById("oralWrongBtn").classList.add("wrong-choice");
        showFeedback("다시 풀어보세요.", false);
        setTimeout(() => document.getElementById("oralWrongBtn").classList.remove("wrong-choice"), 800);
        return;
      }

      choiceLocked = true;
      setOralButtonsDisabled(true);
      document.getElementById("oralWrongBtn").classList.add("wrong-choice");
      showFeedback(`정답은 "${item.answer}"입니다. 다음 문제를 눌러주세요.`, false);
      answers.push({ word:item.word, type:item.type, answer:item.answer, response:"오답", correct:false, retry:retryCount });
      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestionManual() {
      if (!choiceLocked) return;
      nextItem();
    }

    function nextItem() {
      currentIndex++;
      if (currentIndex >= materials.length) finishTraining(); else showItem();
    }

    function finishTraining() {
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("trainingView").classList.add("hidden");
      document.getElementById("finishView").classList.remove("hidden");
      const total = answers.length;
      const correct = answers.filter(a => a.correct).length;
      const wrong = total - correct;
      const rate = total ? Math.round((correct / total) * 100) : 0;
      const subjectName = selectedSubject ? selectedSubject.name : "대상자";
      document.getElementById("finishText").textContent = `${subjectName}님의 유의어·반의어 훈련이 완료되었습니다.`;
      document.getElementById("summaryGrid").innerHTML = `
        <div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div>
        <div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div>
        <div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div>
        <div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;
      const history = Store.load("speech_training_history", []);
      history.push({ id: Date.now(), subjectId:selectedSubjectId, subjectName, training:"유의어·반의어 훈련", date:new Date().toISOString(), total, correct, wrong, rate, answers });
      Store.save("speech_training_history", history);
    }

    renderSubject(); generateMaterials();
  </script>
</body>
