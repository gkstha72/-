<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상황에 맞는 말 고르기</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;background:#f4f6fa;color:#162033}
.app{max-width:1120px;margin:0 auto;padding:24px 22px 48px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px}
.brand{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:900}
.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#315cff,#37c4ff);color:white;display:grid;place-items:center;font-weight:900}
button{border:none;border-radius:14px;padding:12px 17px;font-size:15px;font-weight:900;cursor:pointer}
.primary{background:#246bfe;color:white} .secondary{background:#eef3ff;color:#246bfe} .gray{background:#edf1f6;color:#5d687b}
.blue{background:#246bfe;color:white} .red{background:#e54848;color:white}
.panel{background:white;border:1px solid #e2e8f0;border-radius:24px;padding:22px;box-shadow:0 8px 24px rgba(15,30,60,.06);margin-bottom:20px}
.panel h2{margin:0 0 16px;font-size:22px}
.setup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
label{display:block;font-size:13px;font-weight:900;color:#475569;margin-bottom:7px}
select,textarea{width:100%;border:1px solid #dce3ef;border-radius:13px;padding:12px 13px;font-size:14px;outline:none;background:white}
textarea{min-height:74px;resize:vertical}
.subject-box,.help-box{background:#f8faff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin-bottom:16px;color:#475569;line-height:1.6}
.help-box{margin-top:16px;font-size:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item-card{background:#f8faff;border:1px solid #e2e8f0;border-radius:15px;padding:14px;font-size:15px;line-height:1.5}
.item-card strong{color:#246bfe;margin-right:5px}
.tag{display:inline-block;margin-left:6px;padding:3px 8px;border-radius:999px;background:#eef3ff;color:#246bfe;font-size:12px;font-weight:900}
.hidden{display:none!important}
.progress-line{height:10px;background:#edf1f7;border-radius:999px;overflow:hidden;margin-bottom:18px}
.progress-bar{height:100%;width:0%;background:#246bfe}
.question{color:#246bfe;font-size:25px;line-height:1.5;font-weight:900;text-align:center;margin-bottom:16px}
.training-box{background:#f8faff;border-radius:24px;padding:34px 24px;text-align:center;margin-bottom:18px;min-height:310px;display:grid;place-items:center}
.training-title{font-size:22px;font-weight:900;color:#246bfe;margin-bottom:20px}
.situation{font-size:34px;font-weight:900;line-height:1.45;word-break:keep-all;max-width:920px;margin:0 auto 18px}
.prompt{font-size:22px;font-weight:900;color:#475569;line-height:1.45}
.mode-label{display:inline-block;padding:8px 18px;border-radius:999px;margin-top:22px;font-size:17px;font-weight:900;background:white;border:1px solid #dbe7ff;color:#246bfe}
.answer-options{display:grid;grid-template-columns:repeat(1,1fr);gap:12px;margin-bottom:12px}
.answer-btn{background:#eef3ff;color:#246bfe;border:1px solid #dbe7ff;border-radius:16px;min-height:68px;padding:15px 16px;font-size:23px;font-weight:900;line-height:1.35;text-align:center}
.answer-btn:hover{background:#dfeaff}
.answer-btn.correct-choice{background:#16a06f;color:white;border-color:#16a06f}
.answer-btn.wrong-choice{background:#e54848;color:white;border-color:#e54848}
.oral-box{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.oral-box button{min-height:68px;font-size:24px}
.oral-guide{background:#f8faff;border:1px solid #e2e8f0;border-radius:18px;padding:18px;margin-bottom:12px;text-align:center;color:#334155;font-size:22px;font-weight:900;line-height:1.5}
.example-box{display:none;background:#fff;border:1px solid #dbe7ff;border-radius:18px;padding:16px;margin:12px 0;text-align:center;color:#246bfe;font-size:21px;font-weight:900;line-height:1.5}
#feedbackBox.correct{background:#e8fff4;color:#16a06f;border:1px solid #a7f3d0}
#feedbackBox.wrong{background:#fff1f1;color:#e54848;border:1px solid #fecaca}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
.summary-card{background:white;border:1px solid #edf2f7;border-radius:20px;padding:22px 16px;text-align:center;box-shadow:0 8px 22px rgba(15,30,60,.06)}
.summary-icon{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;margin:0 auto 10px;color:white;font-size:22px;font-weight:900}
.summary-card strong{display:block;font-size:30px;line-height:1;margin-bottom:8px;font-weight:900}
.summary-card span{color:#334155;font-size:15px;font-weight:800}
.summary-card.total strong,.summary-card.rate strong{color:#246bfe} .summary-card.correct strong{color:#16a06f} .summary-card.wrong strong{color:#e54848}
.summary-icon.total,.summary-icon.rate{background:#246bfe} .summary-icon.correct{background:#16a06f} .summary-icon.wrong{background:#e54848}
.result-panel{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border-radius:24px;padding:16px;border:1px solid #edf2f7;box-shadow:0 10px 28px rgba(15,30,60,.05)}
@media(max-width:900px){.setup-grid{grid-template-columns:1fr 1fr}.word-grid{grid-template-columns:repeat(2,1fr)}.topbar{align-items:flex-start;flex-direction:column}}

</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">화</div><span>상황에 맞는 말 고르기</span></div><button class="gray" onclick="location.href='main.html?page=program'">메인으로</button></header>

<section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>

<section id="setupView" class="panel"><h2>훈련 설정</h2>
  <div class="setup-grid">
    <div><label for="responseMode">문제 유형</label><select id="responseMode" onchange="generateMaterials()"><option value="choice" selected>선택형</option><option value="open">개방형</option></select></div>
    <div><label for="count">문제 수</label><select id="count" onchange="generateMaterials()"><option value="5">5문제</option><option value="10" selected>10문제</option><option value="20">20문제</option></select></div>
    <div><label for="orderMode">제시 방식</label><select id="orderMode" onchange="generateMaterials()"><option value="random" selected>무작위</option><option value="order">순서대로</option></select></div>
  </div>
  <div class="help-box">상황을 읽고 사회적으로 적절한 말을 선택하거나 직접 말하는 화용언어 훈련입니다.</div>
  <div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
</section>

<section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
<section id="statsView" class="panel"><h2>자료 수</h2><div id="statsBox"></div></section>

<section id="trainingView" class="panel hidden">
  <div id="question" class="question">상황에 맞는 말을 고르세요.</div>
  <div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
  <div class="training-box">
    <div>
      <div id="trainingTitle" class="training-title">1번 문항</div>
      <div id="situationText" class="situation"></div>
      <div id="promptText" class="prompt"></div>
      
    </div>
  </div>
  <div id="answerOptions" class="answer-options"></div>
  <div id="oralArea" class="hidden">
    <div id="exampleBox" class="example-box"></div>
    <div class="oral-box"><button id="oralCorrectBtn" class="blue" onclick="recordOpenAnswer('correct')">정답</button><button id="oralWrongBtn" class="red" onclick="recordOpenAnswer('wrong')">오답</button></div>
  </div>
  <div id="feedbackBox" style="display:none;margin-top:12px;padding:16px;border-radius:16px;font-size:24px;font-weight:900;text-align:center;"></div>
  <div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div>
  <div style="margin-top:12px;"><textarea id="itemMemo" placeholder="문항별 메모"></textarea></div>
</section>

<section id="finishView" class="panel hidden"><h2>훈련 결과</h2><p id="finishText"></p><div class="result-panel"><div id="summaryGrid" class="summary-grid"></div></div><div class="actions"><button class="primary" onclick="location.href='main.html?page=program'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div></section>
</main>

let materials = [];
let currentIndex = 0;
let answers = [];
let choiceLocked = false;
let retryCount = 0;

function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }
function escapeHtml(value) { return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function typeLabel() { return document.getElementById("responseMode").value === "open" ? "개방형" : "선택형"; }

function renderSubject() {
  const box = document.getElementById("subjectBox");
  if (!selectedSubject) { box.innerHTML = `선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='main.html'">대상자 등록하기</button>`; return; }
  box.innerHTML = `<strong>${escapeHtml(selectedSubject.name)}</strong><br />${escapeHtml(selectedSubject.number || "")} ${selectedSubject.memo ? " · " + escapeHtml(selectedSubject.memo) : ""}`;
}

function generateMaterials() {
  const count = Number(document.getElementById("count").value);
  const orderMode = document.getElementById("orderMode").value;
  let source = orderMode === "random" ? shuffle(SITUATION_DB) : [...SITUATION_DB];
  materials = source.slice(0, Math.min(count, source.length)).map((item, idx) => {
    const choices = shuffle([...item.choices]);
    return {...item, no: idx + 1, choices, memo:""};
  });
  currentIndex = 0;
  answers = [];
  renderPreview();
  renderStats();
}

function renderPreview() {
  document.getElementById("previewTitle").textContent = `생성 자료 ${materials.length}개`;
  const list = document.getElementById("previewList");
  list.innerHTML = materials.map((item, idx) => `<div class="item-card"><strong>${idx + 1}.</strong>${escapeHtml(item.situation)}<br><span class="tag">${typeLabel()}</span></div>`).join("");
}

function renderStats() {
  document.getElementById("statsBox").innerHTML = `<div class="word-grid"><div class="item-card"><strong>전체 자료</strong>${SITUATION_DB.length}개</div><div class="item-card"><strong>선택 자료</strong>${materials.length}개</div><div class="item-card"><strong>문제 유형</strong>${typeLabel()}</div></div>`;
}

function startTraining() {
  if (!materials.length) generateMaterials();
  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("previewView").classList.add("hidden");
  document.getElementById("statsView").classList.add("hidden");
  document.getElementById("trainingView").classList.remove("hidden");
  document.getElementById("finishView").classList.add("hidden");
  currentIndex = 0;
  answers = [];
  showItem();
}

function showItem() {
  choiceLocked = false;
  retryCount = 0;
  const item = materials[currentIndex];
  const responseMode = document.getElementById("responseMode").value;
  document.getElementById("trainingTitle").textContent = `${currentIndex + 1} / ${materials.length}`;
  document.getElementById("situationText").textContent = item.situation;
  document.getElementById("promptText").textContent = item.question;
  
  document.getElementById("progressBar").style.width = `${(currentIndex / materials.length) * 100}%`;
  document.getElementById("itemMemo").value = item.memo || "";
  const feedbackBox = document.getElementById("feedbackBox");
  feedbackBox.style.display = "none";
  feedbackBox.textContent = "";
  feedbackBox.className = "";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("exampleBox").style.display = "none";
  document.getElementById("exampleBox").innerHTML = "";
  document.getElementById("oralCorrectBtn").disabled = false;
  document.getElementById("oralWrongBtn").disabled = false;

  if (responseMode === "open") {
    document.getElementById("answerOptions").classList.add("hidden");
    document.getElementById("oralArea").classList.remove("hidden");
  } else {
    document.getElementById("answerOptions").classList.remove("hidden");
    document.getElementById("oralArea").classList.add("hidden");
    document.getElementById("answerOptions").innerHTML = item.choices.map(choice => `<button class="answer-btn" onclick="selectAnswer(this, '${choice.replace(/'/g,"\\'")}')">${escapeHtml(choice)}</button>`).join("");
  }
}

function showFeedback(message, isCorrectStyle) {
  const feedbackBox = document.getElementById("feedbackBox");
  feedbackBox.style.display = "block";
  feedbackBox.textContent = message;
  feedbackBox.className = isCorrectStyle ? "correct" : "wrong";
}

function setAnswerButtonsDisabled(disabled) {
  document.querySelectorAll(".answer-btn").forEach(btn => { btn.disabled = disabled; });
}

function markChoiceResult(selectedButton, selectedChoice) {
  const item = materials[currentIndex];
  document.querySelectorAll(".answer-btn").forEach(btn => {
    if (btn.textContent === item.answer) btn.classList.add("correct-choice");
    if (btn === selectedButton && selectedChoice !== item.answer) btn.classList.add("wrong-choice");
  });
}

function saveMemo() { if (materials[currentIndex]) materials[currentIndex].memo = document.getElementById("itemMemo").value.trim(); }

function selectAnswer(button, choice) {
  if (choiceLocked) return;
  saveMemo();
  const item = materials[currentIndex];
  const isCorrect = choice === item.answer;

  if (isCorrect) {
    choiceLocked = true;
    setAnswerButtonsDisabled(true);
    markChoiceResult(button, choice);
    showFeedback("정답입니다.", true);
    const countedCorrect = retryCount === 0;
    answers.push({ situation:item.situation, answer:item.answer, response:choice, correct:countedCorrect, retry:retryCount, memo:item.memo || "", mode:"choice" });
    setTimeout(nextItem, 1200);
    return;
  }

  retryCount += 1;

  if (retryCount === 1) {
    button.classList.add("wrong-choice");
    showFeedback("다시 생각해보세요.", false);
    setTimeout(() => button.classList.remove("wrong-choice"), 650);
    return;
  }

  choiceLocked = true;
  setAnswerButtonsDisabled(true);
  markChoiceResult(button, choice);
  showFeedback("정답을 확인한 뒤 다음 문제를 눌러주세요.", false);
  answers.push({ situation:item.situation, answer:item.answer, response:choice, correct:false, retry:retryCount, memo:item.memo || "", mode:"choice" });
  document.getElementById("nextBtn").style.display = "inline-block";
}

function recordOpenAnswer(result) {
  if (choiceLocked) return;
  saveMemo();
  const item = materials[currentIndex];
  choiceLocked = true;
  document.getElementById("oralCorrectBtn").disabled = true;
  document.getElementById("oralWrongBtn").disabled = true;
  const isCorrect = result === "correct";
  showFeedback(isCorrect ? "정답입니다." : "정답을 확인한 뒤 다음 문제를 눌러주세요.", isCorrect);
  const exampleBox = document.getElementById("exampleBox");
  exampleBox.style.display = "block";
  exampleBox.innerHTML = `<strong>예시 답안</strong><br>${escapeHtml(item.answer)}`;
  answers.push({ situation:item.situation, answer:item.answer, response:result, correct:isCorrect, retry:0, memo:item.memo || "", mode:"open" });
  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestionManual() { if (!choiceLocked) return; nextItem(); }

function nextItem() {
  currentIndex++;
  if (currentIndex >= materials.length) finishTraining();
  else showItem();
}

function finishTraining() {
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("trainingView").classList.add("hidden");
  document.getElementById("finishView").classList.remove("hidden");
  const total = answers.length;
  const correct = answers.filter(a => a.correct).length;
  const wrong = total - correct;
  const accuracy = total ? Math.round((correct / total) * 100) : 0;
  const subjectName = selectedSubject ? selectedSubject.name : "대상자";
  const responseMode = document.getElementById("responseMode").value === "open" ? "개방형" : "선택형";
  document.getElementById("finishText").textContent = `${subjectName}님의 상황에 맞는 말 고르기(${responseMode}) 결과입니다.`;
  document.getElementById("summaryGrid").innerHTML = `<div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div><div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div><div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${accuracy}%</strong><span>정답률</span></div>`;
  const results = Store.load("speech_training_history", []);
  results.push({ id: Date.now(), subjectId:selectedSubjectId, subjectName, program:"상황에 맞는 말 고르기", targetType:responseMode, total, correct, wrong, rate:accuracy, answers, date:new Date().toISOString(), createdAt:new Date().toISOString() });
  Store.save("speech_training_history", results);
}

renderSubject();
generateMaterials();
</script>
