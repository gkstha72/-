<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문장 순서 배열 훈련</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;background:#f4f6fa;color:#162033}
.app{max-width:1120px;margin:0 auto;padding:24px 22px 48px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px}
.brand{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:900}
.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#315cff,#37c4ff);color:white;display:grid;place-items:center;font-weight:900}
button{border:none;border-radius:14px;padding:12px 17px;font-size:15px;font-weight:900;cursor:pointer}
.primary{background:#246bfe;color:white}.secondary{background:#eef3ff;color:#246bfe}.gray{background:#edf1f6;color:#5d687b}
.panel{background:white;border:1px solid #e2e8f0;border-radius:24px;padding:22px;box-shadow:0 8px 24px rgba(15,30,60,.06);margin-bottom:20px}
.panel h2{margin:0 0 16px;font-size:22px}.setup-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
label{display:block;font-size:13px;font-weight:900;color:#475569;margin-bottom:7px}
select,textarea{width:100%;border:1px solid #dce3ef;border-radius:13px;padding:12px 13px;font-size:14px;outline:none;background:white}
textarea{min-height:74px;resize:vertical}
.subject-box,.help-box{background:#f8faff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin-bottom:16px;color:#475569;line-height:1.6}.help-box{margin-top:16px;font-size:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item-card{background:#f8faff;border:1px solid #e2e8f0;border-radius:16px;padding:14px;font-size:15px;font-weight:900;color:#334155;line-height:1.5}.item-card strong{color:#246bfe;margin-right:5px}
.tag{display:inline-block;margin:4px 4px 0 0;padding:3px 8px;border-radius:999px;background:#eef3ff;color:#246bfe;font-size:12px;font-weight:900}
.hidden{display:none!important}.progress-line{height:10px;background:#edf1f7;border-radius:999px;overflow:hidden;margin-bottom:18px}.progress-bar{height:100%;width:0%;background:#246bfe}
.question{color:#246bfe;font-size:26px;line-height:1.5;font-weight:900;text-align:center;margin-bottom:16px}
.training-box{background:#f8faff;border-radius:24px;padding:28px 24px;margin-bottom:18px;min-height:430px}.training-title{font-size:22px;font-weight:900;color:#246bfe;text-align:center;margin-bottom:10px}
.scene-title{font-size:34px;font-weight:1000;text-align:center;margin-bottom:22px;color:#162033}
.sentence-list{display:grid;gap:12px;max-width:980px;margin:0 auto}.sentence-card{display:flex;align-items:center;gap:14px;background:white;border:2px solid #dbe7ff;border-radius:18px;padding:16px;min-height:78px;box-shadow:0 8px 18px rgba(15,30,60,.05);cursor:grab;user-select:none}
.sentence-card.dragging{opacity:.45}.order-badge{min-width:42px;height:42px;border-radius:14px;background:#eef3ff;color:#246bfe;display:grid;place-items:center;font-weight:1000;font-size:18px}.sentence-text{font-size:23px;font-weight:900;line-height:1.45;flex:1}.card-controls{display:flex;gap:6px}.mini-btn{padding:8px 10px;border-radius:10px;background:#edf1f6;color:#475569;font-size:13px;min-width:38px}
.button-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:12px 0}.button-row button{min-height:64px;font-size:20px}
.feedback{display:none;margin-top:12px;padding:16px;border-radius:16px;font-size:24px;font-weight:900;text-align:center}.feedback.correct{background:#e8fff4;color:#16a06f;border:1px solid #a7f3d0}.feedback.wrong{background:#fff1f1;color:#e54848;border:1px solid #fecaca}
.answer-box{display:none;margin-top:12px;background:#f8faff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;color:#334155;font-size:18px;font-weight:800;line-height:1.7}.answer-box ol{margin:8px 0 0;padding-left:24px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}.summary-card{background:white;border:1px solid #edf2f7;border-radius:20px;padding:22px 16px;text-align:center;box-shadow:0 8px 22px rgba(15,30,60,.06)}.summary-icon{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;margin:0 auto 10px;color:white;font-size:22px;font-weight:900}.summary-card strong{display:block;font-size:30px;line-height:1;margin-bottom:8px;font-weight:900}.summary-card span{color:#334155;font-size:15px;font-weight:800}.summary-card.total strong,.summary-card.rate strong{color:#246bfe}.summary-card.correct strong{color:#16a06f}.summary-card.wrong strong{color:#e54848}.summary-icon.total,.summary-icon.rate{background:#246bfe}.summary-icon.correct{background:#16a06f}.summary-icon.wrong{background:#e54848}
@media(max-width:900px){.setup-grid{grid-template-columns:1fr 1fr}.word-grid{grid-template-columns:repeat(2,1fr)}.summary-grid{grid-template-columns:repeat(2,1fr)}.topbar{align-items:flex-start;flex-direction:column}.scene-title{font-size:30px}}
@media(max-width:560px){.setup-grid,.word-grid,.button-row,.summary-grid{grid-template-columns:1fr}.question{font-size:22px}.sentence-text{font-size:19px}.scene-title{font-size:26px}.sentence-card{align-items:flex-start}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">순</div><span>문장 순서 배열 훈련</span></div><button class="gray" onclick="location.href='index.html'">메인으로</button></header>
<section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>
<section id="setupView" class="panel">
<h2>훈련 설정</h2>
<div class="setup-grid">
  <div><label for="sentenceLength">문장 수</label><select id="sentenceLength" onchange="generateMaterials();renderStats();"><option value="3" selected>3문장</option><option value="4">4문장</option><option value="5">5문장</option><option value="all">전체</option></select></div>
  <div><label for="count">개수</label><select id="count" onchange="generateMaterials()"><option value="10" selected>10개</option><option value="20">20개</option><option value="30">30개</option><option value="50">50개</option><option value="all">전체</option></select></div>
  <div><label for="orderMode">제시 방식</label><select id="orderMode" onchange="generateMaterials()"><option value="random" selected>무작위</option><option value="order">순서대로</option></select></div>
  <div><label for="controlMode">조작 방식</label><select id="controlMode"><option value="both" selected>드래그+버튼</option><option value="button">버튼만</option></select></div>
</div>
<div class="help-box">문장 카드를 올바른 시간 순서로 배열하는 훈련입니다.</div>
<div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
</section>
<section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
<section id="statsView" class="panel"><h2>자료 수</h2><div id="statsBox"></div></section>
<section id="trainingView" class="panel hidden">
<div id="question" class="question">문장을 순서대로 배열하세요.</div>
<div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
<div class="training-box">
  <div class="training-title" id="trainingTitle">1번 문항</div>
  <div id="sceneTitle" class="scene-title"></div>
  <div id="sentenceList" class="sentence-list"></div>
</div>
<div class="button-row">
  <button class="secondary" onclick="shuffleCurrent()">다시 섞기</button>
  <button class="primary" onclick="checkAnswer()">확인</button>
</div>
<div id="feedbackBox" class="feedback"></div>
<div id="answerBox" class="answer-box"></div>
<div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div>

</section>
<section id="finishView" class="panel hidden">
<h2>훈련 결과</h2><p id="finishText"></p><div class="summary-grid" id="summaryGrid"></div>
<div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div>
</section>
</main>
<script>
const TRAINING_NAME="문장 순서 배열 훈련";
const Store={load(key,fallback){try{const value=localStorage.getItem(key);return value?JSON.parse(value):fallback}catch{return fallback}},save(key,value){localStorage.setItem(key,JSON.stringify(value))}};
const subjects=Store.load("speech_subjects",[]);
const selectedSubjectId=Store.load("speech_selected_subject",null);
const selectedSubject=subjects.find(subject=>subject.id===selectedSubjectId)||null;

let materials=[],currentIndex=0,answers=[],choiceLocked=false,retryCount=0,currentOrder=[],dragIndex=null;
function shuffle(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderSubject(){const box=document.getElementById("subjectBox");if(!selectedSubject){box.innerHTML=`선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`;return}box.innerHTML=`<strong>${selectedSubject.name}</strong><br />${selectedSubject.number||""} ${selectedSubject.memo?" · "+selectedSubject.memo:""}`}
function filteredDB(){const len=document.getElementById("sentenceLength").value;if(len==="all")return SEQUENCE_ITEMS;return SEQUENCE_ITEMS.filter(item=>item.length===Number(len))}
function generateMaterials(){const countValue=document.getElementById("count").value;const orderMode=document.getElementById("orderMode").value;let source=filteredDB();source=orderMode==="random"?shuffle(source):[...source];const limit=countValue==="all"?source.length:Number(countValue);materials=source.slice(0,Math.min(limit,source.length)).map((item,idx)=>({...item,no:idx+1}));currentIndex=0;answers=[];renderPreview()}
function renderPreview(){document.getElementById("previewTitle").textContent=`생성 자료 ${materials.length}개`;const list=document.getElementById("previewList");if(!materials.length){list.innerHTML=`<div class="item-card">조건에 맞는 자료가 없습니다.</div>`;return}list.innerHTML=materials.map((item,idx)=>`<div class="item-card"><strong>${idx+1}.</strong>${escapeHtml(item.title)}<br><span class="tag">${item.length}문장</span></div>`).join("")}
function renderStats(){const count3=SEQUENCE_ITEMS.filter(v=>v.length===3).length;const count4=SEQUENCE_ITEMS.filter(v=>v.length===4).length;const count5=SEQUENCE_ITEMS.filter(v=>v.length===5).length;document.getElementById("statsBox").innerHTML=`<div class="word-grid"><div class="item-card"><strong>3문장</strong>${count3}개</div><div class="item-card"><strong>4문장</strong>${count4}개</div><div class="item-card"><strong>5문장</strong>${count5}개</div></div>`}
function startTraining(){if(!materials.length)generateMaterials();if(!materials.length)return;document.getElementById("setupView").classList.add("hidden");document.getElementById("previewView").classList.add("hidden");document.getElementById("statsView").classList.add("hidden");document.getElementById("trainingView").classList.remove("hidden");document.getElementById("finishView").classList.add("hidden");currentIndex=0;answers=[];showItem()}
function makeShuffledOrder(item){const original=item.sentences.map((text,idx)=>({text,idx}));let mixed=shuffle(original);let same=mixed.every((v,i)=>v.idx===i);if(same&&mixed.length>1){[mixed[0],mixed[1]]=[mixed[1],mixed[0]]}return mixed}
function showItem(){choiceLocked=false;retryCount=0;const item=materials[currentIndex];currentOrder=makeShuffledOrder(item);document.getElementById("trainingTitle").textContent=`${currentIndex+1} / ${materials.length}`;document.getElementById("sceneTitle").textContent=item.title;document.getElementById("progressBar").style.width=`${(currentIndex/materials.length)*100}%`;document.getElementById("feedbackBox").style.display="none";document.getElementById("feedbackBox").textContent="";document.getElementById("feedbackBox").className="feedback";document.getElementById("answerBox").style.display="none";document.getElementById("answerBox").innerHTML="";document.getElementById("nextBtn").style.display="none";renderSentenceList()}
function renderSentenceList(){const list=document.getElementById("sentenceList");const controlMode=document.getElementById("controlMode").value;list.innerHTML=currentOrder.map((item,idx)=>`<div class="sentence-card" draggable="${controlMode!=='button'&&!choiceLocked}" data-index="${idx}" ondragstart="handleDragStart(event, ${idx})" ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${idx})" ondragend="handleDragEnd(event)"><div class="order-badge">${idx+1}</div><div class="sentence-text">${escapeHtml(item.text)}</div><div class="card-controls"><button class="mini-btn" onclick="moveCard(${idx}, -1)" ${idx===0||choiceLocked?'disabled':''}>▲</button><button class="mini-btn" onclick="moveCard(${idx}, 1)" ${idx===currentOrder.length-1||choiceLocked?'disabled':''}>▼</button></div></div>`).join("")}
function handleDragStart(event,idx){if(choiceLocked||document.getElementById("controlMode").value==="button")return;dragIndex=idx;event.currentTarget.classList.add("dragging");event.dataTransfer.effectAllowed="move"}
function handleDragOver(event){event.preventDefault()}
function handleDrop(event,dropIndex){event.preventDefault();if(choiceLocked||dragIndex===null||dragIndex===dropIndex)return;const moving=currentOrder.splice(dragIndex,1)[0];currentOrder.splice(dropIndex,0,moving);dragIndex=null;renderSentenceList()}
function handleDragEnd(event){event.currentTarget.classList.remove("dragging");dragIndex=null}
function moveCard(idx,delta){if(choiceLocked)return;const next=idx+delta;if(next<0||next>=currentOrder.length)return;[currentOrder[idx],currentOrder[next]]=[currentOrder[next],currentOrder[idx]];renderSentenceList()}
function shuffleCurrent(){if(choiceLocked)return;currentOrder=makeShuffledOrder(materials[currentIndex]);renderSentenceList()}

function showFeedback(message,isCorrectStyle){const box=document.getElementById("feedbackBox");box.style.display="block";box.textContent=message;box.className="feedback "+(isCorrectStyle?"correct":"wrong")}
function showAnswer(){const item=materials[currentIndex];const box=document.getElementById("answerBox");box.style.display="block";box.innerHTML=`<strong>정답 순서</strong><ol>${item.sentences.map(s=>`<li>${escapeHtml(s)}</li>`).join("")}</ol>`}

function checkAnswer(){if(choiceLocked)return;const item=materials[currentIndex];const isCorrect=currentOrder.every((v,idx)=>v.idx===idx);if(isCorrect){choiceLocked=true;showFeedback("정답입니다.",true);showAnswer();const countedCorrect=retryCount===0;answers.push({title:item.title,length:item.length,response:currentOrder.map(v=>v.text),correct:countedCorrect,retry:retryCount});document.getElementById("nextBtn").style.display="inline-block";renderSentenceList();return}retryCount+=1;if(retryCount===1){showFeedback("다시 배열해보세요.",false);return}choiceLocked=true;showFeedback("정답 순서를 확인하고 다음 문제를 눌러주세요.",false);showAnswer();answers.push({title:item.title,length:item.length,response:currentOrder.map(v=>v.text),correct:false,retry:retryCount});document.getElementById("nextBtn").style.display="inline-block";renderSentenceList()}
function nextQuestionManual(){if(!choiceLocked)return;nextItem()}
function nextItem(){currentIndex++;if(currentIndex>=materials.length)finishTraining();else showItem()}
function finishTraining(){document.getElementById("progressBar").style.width="100%";document.getElementById("trainingView").classList.add("hidden");document.getElementById("finishView").classList.remove("hidden");const total=answers.length;const correct=answers.filter(a=>a.correct).length;const wrong=total-correct;const rate=total?Math.round((correct/total)*100):0;const subjectName=selectedSubject?selectedSubject.name:"대상자";document.getElementById("finishText").textContent=`${subjectName}님의 ${TRAINING_NAME} 결과입니다.`;document.getElementById("summaryGrid").innerHTML=`<div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div><div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div><div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;const history=Store.load("speech_training_history",[]);history.push({id:Date.now(),subjectId:selectedSubjectId,subjectName,training:TRAINING_NAME,date:new Date().toISOString(),total,correct,wrong,rate,answers});Store.save("speech_training_history",history)}
renderSubject();generateMaterials();renderStats();
</script>
</body>
</html>
