button { border:none; border-radius:14px; padding:12px 17px; font-size:15px; font-weight:900; cursor:pointer; }
.primary { background:#246bfe; color:white; }
.secondary { background:#eef3ff; color:#246bfe; }
.gray { background:#edf1f6; color:#5d687b; }
.panel { background:white; border:1px solid #e2e8f0; border-radius:24px; padding:22px; box-shadow:0 8px 24px rgba(15,30,60,.06); margin-bottom:20px; }
.panel h2 { margin:0 0 16px; font-size:22px; }
.setup-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
label { display:block; font-size:13px; font-weight:900; color:#475569; margin-bottom:7px; }
select, textarea { width:100%; border:1px solid #dce3ef; border-radius:13px; padding:12px 13px; font-size:14px; outline:none; background:white; }
textarea { min-height:74px; resize:vertical; }
.subject-box,.help-box { background:#f8faff; border:1px solid #e2e8f0; border-radius:18px; padding:16px; margin-bottom:16px; color:#475569; line-height:1.6; }
.help-box { margin-top:16px; font-size:14px; }
.actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.word-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.item-card { background:#f8faff; border:1px solid #e2e8f0; border-radius:15px; padding:14px; font-size:15px; line-height:1.5; }
.item-card strong { color:#246bfe; margin-right:5px; }
.hidden { display:none !important; }
.progress-line { height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin-bottom:18px; }
.progress-bar { height:100%; width:0%; background:#246bfe; }
.question { color:#246bfe; font-size:25px; line-height:1.5; font-weight:900; text-align:center; margin-bottom:16px; }
.training-box { background:#f8faff; border-radius:24px; padding:38px 24px; text-align:center; margin-bottom:18px; min-height:300px; display:grid; place-items:center; }
.training-title { font-size:22px; font-weight:900; color:#246bfe; margin-bottom:22px; }
.sentence { font-size:38px; font-weight:900; line-height:1.45; word-break:keep-all; }
.blank { display:inline-block; min-width:140px; padding:0 10px 4px; color:#246bfe; border-bottom:5px solid #246bfe; }
.answer-options { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:12px; }
.answer-btn { background:#eef3ff; color:#246bfe; border:1px solid #dbe7ff; border-radius:16px; min-height:68px; padding:15px 12px; font-size:22px; font-weight:900; }
.answer-btn:hover { background:#dfeaff; }
.answer-btn.correct-choice { background:#16a06f; color:white; border-color:#16a06f; }
.answer-btn.wrong-choice { background:#e54848; color:white; border-color:#e54848; }
.feedback { display:none; margin-top:12px; padding:16px; border-radius:16px; font-size:24px; font-weight:900; text-align:center; }
.stats-mini { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; font-size:13px; }
.stats-mini div { background:#f8faff; border:1px solid #e2e8f0; border-radius:12px; padding:8px 10px; display:flex; justify-content:space-between; gap:6px; }
.stats-mini b { color:#246bfe; }
.result-panel { background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%); border-radius:24px; padding:16px; border:1px solid #edf2f7; box-shadow:0 10px 28px rgba(15,30,60,.05); }
.summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px; }
.summary-card { background:white; border:1px solid #edf2f7; border-radius:20px; padding:22px 16px; text-align:center; box-shadow:0 8px 22px rgba(15,30,60,.06); }
.summary-icon { width:40px; height:40px; border-radius:14px; display:grid; place-items:center; margin:0 auto 10px; color:white; font-size:22px; font-weight:900; }
.summary-card strong { display:block; font-size:30px; line-height:1; margin-bottom:8px; font-weight:900; }
.summary-card span { color:#334155; font-size:15px; font-weight:800; }
.summary-card.correct strong { color:#16a06f; }
.summary-card.wrong strong { color:#e54848; }
.summary-card.total strong,.summary-card.rate strong { color:#246bfe; }
.summary-icon.correct { background:#16a06f; }
.summary-icon.wrong { background:#e54848; }
.summary-icon.total,.summary-icon.rate { background:#246bfe; }

<main class="app">
<header class="topbar"><div class="brand"><div class="logo">조</div><span>문장완성하기훈련 (조사)</span></div><button class="gray" onclick="location.href='index.html'">메인으로</button></header>

<section class="panel"><h2>대상자</h2><div id="subjectBox" class="subject-box"></div></section>

<section id="setupView" class="panel">
<h2>훈련 설정</h2>
<div class="setup-grid">
<div><label for="count">개수</label><select id="count" onchange="generateMaterials()"><option value="10" selected>10개</option><option value="20">20개</option><option value="30">30개</option><option value="40">40개</option><option value="50">50개</option><option value="100">100개</option></select></div>
<div><label for="choiceCount">보기 개수</label><select id="choiceCount" onchange="generateMaterials()"><option value="2" selected>2개 보기</option><option value="4">4개 보기</option></select></div>
<div><label for="orderMode">제시 방식</label><select id="orderMode" onchange="generateMaterials()"><option value="random" selected>무작위</option><option value="order">순서대로</option></select></div>
</div>
<div class="help-box">조사 전용 문장 완성 훈련입니다. 빈칸에 알맞은 조사를 고르는 활동으로, 주격·목적격·장소·도구·동반·보조·소유 조사 문항을 포함했습니다.</div>
<div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
</section>

<section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>
<section id="statsView" class="panel"><h2>문항 수</h2><div id="statsBox"></div></section>

<section id="trainingView" class="panel hidden">
<div id="question" class="question">빈칸에 알맞은 조사를 고르세요.</div>
<div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
<div class="training-box"><div><div id="trainingTitle" class="training-title">1번 문항</div><div id="sentence" class="sentence"></div></div></div>
<div id="answerOptions" class="answer-options"></div>
<div id="feedbackBox" class="feedback"></div>
<div style="text-align:center;margin-top:12px;"><button id="nextBtn" class="primary" style="display:none;" onclick="nextQuestionManual()">다음 문제</button></div>
<div style="margin-top:12px;"><textarea id="itemMemo" placeholder="문항별 메모"></textarea></div>
</section>

<section id="finishView" class="panel hidden">
<h2>훈련 결과</h2>
<p id="finishText"></p>
<div class="result-panel"><div id="summaryGrid" class="summary-grid"></div></div>
<div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div>
</section>
</main>

let materials = [];
let currentIndex = 0;
let answers = [];
let choiceLocked = false;
let retryCount = 0;

function unique(array) { return [...new Set(array)]; }
function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }

function renderSubject() {
  const box = document.getElementById("subjectBox");
  if (!selectedSubject) {
    box.innerHTML = `선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`;
    return;
  }
  box.innerHTML = `<strong>${selectedSubject.name}</strong><br />${selectedSubject.number || "등록번호 없음"} · ${selectedSubject.gender} · ${selectedSubject.age}세<br />${selectedSubject.diagnosis || "진단명 미입력"} · ${selectedSubject.goal || "목표 미입력"}`;
}

function getSettings() {
  return {
    count: Number(document.getElementById("count").value) || 10,
    choiceCount: Number(document.getElementById("choiceCount").value) === 4 ? 4 : 2,
    orderMode: document.getElementById("orderMode").value
  };
}

function makeChoices(item, settings) {
  const needWrong = settings.choiceCount - 1;
  let wrongs = Array.isArray(item.wrongs) ? item.wrongs.filter(answer => answer !== item.answer) : [];
  wrongs = shuffle(unique(wrongs)).slice(0, needWrong);
  if (wrongs.length < needWrong) {
    const pool = unique(SENTENCE_DB.map(x => x.answer).filter(answer => answer !== item.answer && !wrongs.includes(answer)));
    wrongs.push(...shuffle(pool).slice(0, needWrong - wrongs.length));
  }
  return shuffle([item.answer, ...wrongs.slice(0, needWrong)]);
}

function buildMaterials() {
  const settings = getSettings();
  const source = settings.orderMode === "random" ? shuffle(SENTENCE_DB) : [...SENTENCE_DB];
  return source.slice(0, Math.min(settings.count, source.length)).map(item => ({
    ...item,
    choices: makeChoices(item, settings),
    question: "빈칸에 알맞은 조사를 고르세요."
  }));
}

function sentenceToHtml(sentence) {
  return sentence.replace("___", `<span class="blank">&nbsp;</span>`);
}

function safeText(value) {
  return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function generateMaterials() {
  materials = buildMaterials();
  renderPreview();
}

function renderPreview() {
  const settings = getSettings();
  const previewTitle = document.getElementById("previewTitle");
  const previewList = document.getElementById("previewList");
  previewTitle.textContent = `조사 · ${settings.choiceCount}개 보기 · 문장 완성 ${materials.length}개`;
  if (materials.length === 0) {
    previewList.innerHTML = `<div class="item-card">문항이 없습니다.</div>`;
    return;
  }
  previewList.innerHTML = materials.map((item, index) =>
    `<div class="item-card"><strong>${index + 1}.</strong>${safeText(item.sentence.replace("___", "_____"))}</div>`
  ).join("");
}

function renderStats() {
  document.getElementById("statsBox").innerHTML =
    `<div class="stats-mini"><div><span>조사 문항</span><b>${SENTENCE_DB.length}</b></div><div><span>보기</span><b>2개/4개</b></div><div><span>재시도</span><b>1회</b></div></div>`;
}

function startTraining() {
  if (!selectedSubject) {
    alert("대상자를 먼저 등록하거나 선택해주세요.");
    location.href = "index.html";
    return;
  }
  if (materials.length === 0) generateMaterials();
  if (materials.length === 0) return;
  currentIndex = 0;
  answers = [];
  choiceLocked = false;
  retryCount = 0;
  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("previewView").classList.add("hidden");
  document.getElementById("statsView").classList.add("hidden");
  document.getElementById("trainingView").classList.remove("hidden");
  document.getElementById("finishView").classList.add("hidden");
  renderQuestion();
}

function renderQuestion() {
  const item = materials[currentIndex];
  choiceLocked = false;
  retryCount = 0;
  document.getElementById("itemMemo").value = "";
  document.getElementById("trainingTitle").textContent = `${currentIndex + 1}번 문항 / ${materials.length}개`;
  document.getElementById("question").textContent = item.question;
  document.getElementById("sentence").innerHTML = sentenceToHtml(item.sentence);
  document.getElementById("progressBar").style.width = `${(currentIndex / materials.length) * 100}%`;

  const feedbackBox = document.getElementById("feedbackBox");
  feedbackBox.style.display = "none";
  feedbackBox.textContent = "";

  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("answerOptions").innerHTML = item.choices.map(choice => {
    const safe = safeText(choice);
    return `<button class="answer-btn" data-choice="${safe}" onclick="chooseAnswer(this, this.dataset.choice)">${safe}</button>`;
  }).join("");
}

function showFeedback(message, isCorrectStyle) {
  const feedbackBox = document.getElementById("feedbackBox");
  feedbackBox.style.display = "block";
  feedbackBox.textContent = message;
  feedbackBox.style.background = isCorrectStyle ? "#e8fff4" : "#fff1f1";
  feedbackBox.style.color = isCorrectStyle ? "#16a06f" : "#e54848";
  feedbackBox.style.border = isCorrectStyle ? "1px solid #a7f3d0" : "1px solid #fecaca";
}

function markChoices(selectedButton, selected) {
  const item = materials[currentIndex];
  document.querySelectorAll(".answer-btn").forEach(btn => {
    if (btn.textContent === item.answer) btn.classList.add("correct-choice");
    if (btn === selectedButton && selected !== item.answer) btn.classList.add("wrong-choice");
  });
}

function chooseAnswer(button, selected) {
  if (choiceLocked) return;

  const item = materials[currentIndex];
  const isCorrect = selected === item.answer;

  if (isCorrect) {
    choiceLocked = true;
    markChoices(button, selected);
    const countedCorrect = retryCount === 0;

    if (countedCorrect) showFeedback("정답입니다.", true);
    else showFeedback("정답입니다.", false);

    setTimeout(() => recordAnswer(countedCorrect ? "correct" : "wrong", selected, retryCount), 1200);
    return;
  }

  retryCount += 1;

  if (retryCount === 1) {
    button.classList.add("wrong-choice");
    showFeedback("다시 풀어보세요.", false);
    setTimeout(() => button.classList.remove("wrong-choice"), 800);
    return;
  }

  choiceLocked = true;
  markChoices(button, selected);
  showFeedback("정답을 확인한 뒤 다음 문제를 눌러주세요.", false);
  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestionManual() {
  if (!choiceLocked) return;
  recordAnswer("wrong", "오답", retryCount);
}

function recordAnswer(result, selected, retry) {
  const item = materials[currentIndex];
  answers.push({
    index: currentIndex + 1,
    sentence: item.sentence,
    answer: item.answer,
    selected: selected || "",
    type: "문장완성하기(조사)",
    result,
    retry: retry || 0,
    memo: document.getElementById("itemMemo").value || ""
  });
  currentIndex++;
  if (currentIndex >= materials.length) finishTraining();
  else renderQuestion();
}

function finishTraining() {
  document.getElementById("trainingView").classList.add("hidden");
  document.getElementById("finishView").classList.remove("hidden");
  document.getElementById("progressBar").style.width = "100%";
  const total = answers.length;
  const correct = answers.filter(answer => answer.result === "correct").length;
  const wrong = total - correct;
  const rate = total ? Math.round((correct / total) * 100) : 0;

document.getElementById("finishText").textContent = `${selectedSubject ? selectedSubject.name + " 대상자" : "대상자"}의 문장완성하기(조사) 훈련이 완료되었습니다.`;
document.getElementById("summaryGrid").innerHTML = `
  <div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div>
  <div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div>
  <div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div>
  <div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;

const history = Store.load("speech_training_history", []);
history.unshift({
  id: Date.now(),
  type: "문장완성하기(조사)",
  subjectId: selectedSubjectId,
  subjectName: selectedSubject ? selectedSubject.name : "",
  date: new Date().toISOString(),
  total,
  correct,
  wrong,
  rate,
  answers
});
  Store.save("speech_training_history", history.slice(0, 200));
}

renderSubject();
renderStats();
generateMaterials();
</script>
