  <div><label for="explainMode">설명 표시</label><select id="explainMode"><option value="after" selected>정답 후 표시</option><option value="hide">표시 안 함</option></select></div>
</div>

<div class="actions"><button class="primary" onclick="generateMaterials()">자료 생성</button><button class="secondary" onclick="startTraining()">훈련 시작</button></div>
</section>

<section id="previewView" class="panel"><h2 id="previewTitle">생성 자료</h2><div id="previewList" class="word-grid"></div></section>

<section id="trainingView" class="panel hidden">
<div id="question" class="question">같은 단어가 다른 뜻으로 쓰인 문장을 고르세요.</div>

<div class="actions"><button class="primary" onclick="location.href='index.html'">메인으로</button><button class="secondary" onclick="location.reload()">같은 훈련 다시 하기</button></div>
</section>
</main>

    instruction: "같은 단어가 다른 뜻으로 쓰인 문장을 고르세요.",
    targetMeaning: "무게가 적다",
    oddMeaning: "마음이나 기분이 편하다",
    choices: [
      {

        meaning: "무게가 적다",
        isOdd: false
      },
      {

        meaning: "마음이나 기분이 편하다",

      }
    ],
    answer: "숙제를 끝내니 마음이 가벼워졌어요.",
    explanation: "'마음이 가벼워졌어요'의 가볍다는 기분이 편해졌다는 뜻이고, 나머지 가볍다는 무게가 적다는 뜻입니다."

    oddMeaning: "기분이나 분위기가 가라앉아 있다",
    choices: [
      {

      },
      {

        isOdd: true

let materials=[],currentIndex=0,answers=[],choiceLocked=false,retryCount=0;

function unique(array){return[...new Set(array)]}
function shuffle(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function highlightWord(sentence, word){
  const safe = escapeHtml(sentence);
  const escapedWord = escapeHtml(word);

  // 기본 단어가 그대로 들어간 경우
  if (safe.includes(escapedWord)) {
    return safe.split(escapedWord).join(`<span class="highlight-word">${escapedWord}</span>`);
  }

  // 활용형 문항에서 실제 문장에 나타나는 형태만 표시
  const variants = {
    "차다": ["차서", "차게", "찼어요", "찬"],
    "타다": ["타서", "탔어요", "타고", "탄"],
    "쓰다": ["썼어요", "써서", "쓰고", "쓴"],
    "보다": ["보았어요", "봤어요", "보고", "본"],
    "나다": ["났어요", "나서", "난"],
    "들다": ["들었어요", "들고", "든"],
    "놓다": ["놓았어요", "놓아", "놓고", "놓은"],
    "잡다": ["잡았어요", "잡아", "잡고", "잡은"],
    "치다": ["쳤어요", "쳐", "치고", "친"],
    "피다": ["피었어요", "피어", "피고", "핀"],
    "익다": ["익었어요", "익어서", "익고", "익은"],
    "오르다": ["올랐어요", "올라", "오르고", "오른"],
    "내리다": ["내렸어요", "내려", "내리고", "내린"],
    "열다": ["열었어요", "열어", "열고", "연"],
    "막다": ["막고", "막아서", "막는", "막았어요"],
    "풀다": ["풀었어요", "풀어", "풀고", "푼"],
    "밝다": ["밝아서", "밝게", "밝고", "밝은"],
    "깊다": ["깊어요", "깊은", "깊고"],
    "가볍다": ["가벼워요", "가벼워졌어요", "가벼운"],
    "무겁다": ["무거워요", "무거워서", "무겁게", "무거운"],
    "맞다": ["맞아요", "맞는", "맞았어요"],
    "세다": ["세어", "세었어요", "세서"],
    "쉬다": ["쉬었어요", "쉬어"],
    "돌다": ["돌았어요", "돌기", "돌고"],
    "걸다": ["걸었어요"],
    "끊다": ["끊었어요"],
    "붙다": ["붙었어요"],
    "빠지다": ["빠졌어요"],
    "지다": ["졌어요", "지고"],
    "빼다": ["뺐어요"],
    "오다": ["왔어요", "오셨어요"],
    "가다": ["갔어요"],
    "먹다": ["먹었어요"],
    "세우다": ["세웠어요"],
    "내다": ["냈어요", "내어", "내다"],
    "매다": ["맸어요", "매고"],
    "부치다": ["부쳤어요"],
    "사다": ["샀어요"],
    "살다": ["살아요"],
    "넘다": ["넘었어요", "넘어요"],
    "식다": ["식었어요", "식기"],
    "얼다": ["얼었어요", "얼어"],
    "풀리다": ["풀렸어요"],
    "말다": ["말아요", "말았어요"],
    "맡다": ["맡았어요"],
    "크다": ["커요", "큰"],
    "작다": ["작은", "작아서"]
  };

  let result = safe;
  const list = (variants[word] || []).slice().sort((a,b) => b.length - a.length);
  list.forEach(v => {
    const escapedVariant = escapeHtml(v);
    result = result.split(escapedVariant).join(`<span class="highlight-word">${escapedVariant}</span>`);
  });
  return result;
}

function isConjugationItem(item){
  if (item.word.endsWith("다")) return true;
  const conjugationLikeWords = ["알","입","팔","신","사과"];
  return conjugationLikeWords.includes(item.word);
}

function getTypeName(item){
  return isConjugationItem(item) ? "활용형" : "단어형";
}

function renderSubject(){
  const box=document.getElementById("subjectBox");
  if(!selectedSubject){box.innerHTML=`선택된 대상자가 없습니다. <button class="secondary" onclick="location.href='index.html'">대상자 등록하기</button>`;return}
  box.innerHTML=`<strong>${selectedSubject.name}</strong><br />${selectedSubject.number||""} ${selectedSubject.memo?" · "+selectedSubject.memo:""}`;
}

function generateMaterials(){
  const typeValue=document.getElementById("itemType").value;
  const countValue=document.getElementById("count").value;
  const orderMode=document.getElementById("orderMode").value;
  let source=POLYSEMY_ITEMS.filter(item=>{
    if(typeValue==="all") return true;
    if(typeValue==="conjugation") return isConjugationItem(item);
    return !isConjugationItem(item);
  });
  source=orderMode==="random"?shuffle(source):[...source];
  const limit=countValue==="all"?source.length:Number(countValue);
  materials=source.slice(0,Math.min(limit,source.length)).map((item,idx)=>({...item,no:idx+1, choices:shuffle(item.choices)}));
  currentIndex=0;answers=[];renderPreview();
}

function renderPreview(){
  document.getElementById("previewTitle").textContent=`생성 자료 ${materials.length}개`;
  const list=document.getElementById("previewList");
  if(!materials.length){list.innerHTML=`<div class="item-card">조건에 맞는 자료가 없습니다.</div>`;return}
  list.innerHTML=materials.map((item,idx)=>`<div class="item-card"><strong>${idx+1}.</strong>${item.word}<span class="tag">${getTypeName(item)}</span><br><span class="tag">${item.targetMeaning}</span><br><span class="tag">다른 뜻: ${item.oddMeaning}</span></div>`).join("");
}

function startTraining(){
  if(!materials.length)generateMaterials();
  if(!materials.length)return;
  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("previewView").classList.add("hidden");
  document.getElementById("trainingView").classList.remove("hidden");
  document.getElementById("finishView").classList.add("hidden");
  currentIndex=0;answers=[];showItem();
}

function showItem(){
  choiceLocked=false;retryCount=0;
  const item=materials[currentIndex];
  document.getElementById("trainingTitle").textContent=`${currentIndex+1} / ${materials.length}`;
  document.getElementById("targetWord").textContent=item.word;
  document.getElementById("meaningLine").innerHTML=`기준 뜻: <strong>${escapeHtml(item.targetMeaning)}</strong><br>다른 뜻으로 쓰인 문장을 찾으세요.`;
  document.getElementById("progressBar").style.width=`${(currentIndex/materials.length)*100}%`;
  document.getElementById("feedbackBox").style.display="none";
  document.getElementById("feedbackBox").textContent="";
  document.getElementById("feedbackBox").className="feedback";
  document.getElementById("explanationBox").style.display="none";
  document.getElementById("explanationBox").textContent="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("answerOptions").innerHTML=item.choices.map((choice,idx)=>`<button class="answer-btn" onclick="selectAnswer(this, ${idx})">${highlightWord(choice.text,item.word)}</button>`).join("");
}


function showFeedback(message,isCorrectStyle){
  const box=document.getElementById("feedbackBox");
  box.style.display="block";box.textContent=message;box.className="feedback "+(isCorrectStyle?"correct":"wrong");
}

function showExplanation(){
  if(document.getElementById("explainMode").value==="hide")return;
  const item=materials[currentIndex];
  const box=document.getElementById("explanationBox");
  box.style.display="block";
  box.textContent=`설명: ${item.explanation}`;
}

function setAnswerButtonsDisabled(disabled){document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=disabled)}

function markChoiceResult(selectedButton,choice){
  const item=materials[currentIndex];
  document.querySelectorAll(".answer-btn").forEach((btn,idx)=>{
    if(item.choices[idx].isOdd)btn.classList.add("correct-choice");
    if(btn===selectedButton&&!choice.isOdd)btn.classList.add("wrong-choice");
  });
}

function selectAnswer(button,idx){
  if(choiceLocked)return;
  const item=materials[currentIndex];
  const choice=item.choices[idx];

  if(choice.isOdd){
    choiceLocked=true;
    setAnswerButtonsDisabled(true);
    markChoiceResult(button,choice);
    showFeedback("정답입니다.",true);
    showExplanation();
    const countedCorrect=retryCount===0;
    answers.push({word:item.word,answer:item.answer,response:choice.text,correct:countedCorrect,retry:retryCount});
    document.getElementById("nextBtn").style.display="inline-block";
    return;
  }

  retryCount+=1;
  if(retryCount===1){
    button.classList.add("wrong-choice");
    showFeedback("다시 풀어보세요.",false);
    setTimeout(()=>button.classList.remove("wrong-choice"),800);
    return;
  }

  choiceLocked=true;
  setAnswerButtonsDisabled(true);
  markChoiceResult(button,choice);
  showFeedback(`정답은 "${item.answer}"입니다. 다음 문제를 눌러주세요.`,false);
  showExplanation();
  answers.push({word:item.word,answer:item.answer,response:choice.text,correct:false,retry:retryCount});
  document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestionManual(){if(!choiceLocked)return;nextItem()}

function nextItem(){
  currentIndex++;
  if(currentIndex>=materials.length)finishTraining();else showItem();
}

function finishTraining(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("trainingView").classList.add("hidden");
  document.getElementById("finishView").classList.remove("hidden");
  const total=answers.length;
  const correct=answers.filter(a=>a.correct).length;
  const wrong=total-correct;
  const rate=total?Math.round((correct/total)*100):0;
  const subjectName=selectedSubject?selectedSubject.name:"대상자";
  document.getElementById("finishText").textContent=`${subjectName}님의 ${TRAINING_NAME} 결과입니다.`;
  document.getElementById("summaryGrid").innerHTML=`<div class="summary-card total"><div class="summary-icon total">#</div><strong>${total}</strong><span>전체 문항</span></div><div class="summary-card correct"><div class="summary-icon correct">✓</div><strong>${correct}</strong><span>정답</span></div><div class="summary-card wrong"><div class="summary-icon wrong">!</div><strong>${wrong}</strong><span>오답</span></div><div class="summary-card rate"><div class="summary-icon rate">%</div><strong>${rate}%</strong><span>정답률</span></div>`;
  const history=Store.load("speech_training_history",[]);
  history.push({id:Date.now(),subjectId:selectedSubjectId,subjectName,training:TRAINING_NAME,date:new Date().toISOString(),total,correct,wrong,rate,answers});
  Store.save("speech_training_history",history);
}

renderSubject();generateMaterials();
</script>
